<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPR Migration and Archiving - ROI Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #EEF6F4; overflow-x: hidden; }

/* ═══════════════════════════════════════════════════════════════
   ROI Calculator — Animations & Interactions
   ═══════════════════════════════════════════════════════════════ */

/* ── Keyframe animations ── */
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 2px 12px rgba(15,65,70,.3); }
  50% { box-shadow: 0 2px 24px rgba(15,65,70,.55); }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes think-fill {
  0% { width: 0%; }
  15% { width: 20%; }
  40% { width: 45%; }
  65% { width: 70%; }
  85% { width: 88%; }
  100% { width: 100%; }
}
@keyframes think-pulse {
  0%, 100% { opacity: .4; }
  50% { opacity: 1; }
}
@keyframes calc-fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes calc-spin {
  to { transform: rotate(360deg); }
}

/* ── Card hover ── */
.roi-card {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
}
.roi-card:hover {
  border-color: rgba(15,65,70,.25) !important;
  box-shadow: 0 2px 12px rgba(15,65,70,.08);
}

/* ── Generic button hover ── */
.roi-btn {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-btn:hover {
  border-color: rgba(15,65,70,.35) !important;
  box-shadow: 0 2px 16px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-btn:active {
  transform: translateY(0);
  box-shadow: 0 1px 4px rgba(15,65,70,.12);
}

/* ── Toggle pill (overrides roi-btn lift for flush buttons) ── */
.roi-toggle-pill .roi-btn {
  transform: none !important;
  box-shadow: none !important;
  border-color: transparent !important;
}
.roi-toggle-pill .roi-btn:hover {
  transform: none !important;
  box-shadow: none !important;
  opacity: .85;
}

/* ── Preset buttons ── */
.roi-preset {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-preset:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-preset:active {
  transform: translateY(0);
}

/* ── Tier cards ── */
.roi-tier {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-tier:hover {
  box-shadow: 0 2px 14px rgba(15,65,70,.08);
  border-color: rgba(15,65,70,.2) !important;
}

/* ── Text links ── */
.roi-link {
  transition: color .15s ease, opacity .15s ease;
}
.roi-link:hover {
  opacity: .7;
}

/* ── Clickable cost display ── */
.roi-cost {
  transition: border-color .2s ease, color .15s ease;
}
.roi-cost:hover {
  border-bottom-color: rgba(15,65,70,.5) !important;
}

/* ── Result cards ── */
.roi-result {
  transition: box-shadow .2s ease, transform .15s ease, border-color .2s ease;
}
.roi-result:hover {
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-2px);
  border-color: rgba(15,65,70,.15) !important;
}

/* ── Scenario chooser ── */
.roi-scenario {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-scenario:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 2px 14px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-scenario:active {
  transform: translateY(0);
}

/* ── Flagship rows ── */
.roi-flag {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-flag:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 2px 10px rgba(15,65,70,.06);
}

/* ── Tab buttons ── */
.roi-tab {
  transition: background .15s ease, color .15s ease;
}
.roi-tab:hover {
  background: rgba(15,65,70,.04) !important;
}

/* ── Slider hover ── */
.roi-slider {
  transition: opacity .15s ease;
}
.roi-slider:hover input[type="range"] {
  filter: brightness(.95);
}
.roi-slider input[type="range"] {
  transition: filter .15s ease;
}

/* ── Per-org rows ── */
.roi-org {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-org:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 1px 8px rgba(15,65,70,.06);
}

/* ── CTA button ── */
.roi-cta {
  transition: box-shadow .2s ease, transform .15s ease;
}
.roi-cta:hover {
  box-shadow: 0 4px 24px rgba(15,65,70,.2) !important;
  transform: translateY(-1px);
}
.roi-cta:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(15,65,70,.15) !important;
}

/* ═══════════════════════════════════════════════════════════════
   Mobile & Touch
   ═══════════════════════════════════════════════════════════════ */

/* On touch devices, disable hover transforms to prevent sticky states */
@media (hover: none) {
  .roi-btn:hover,
  .roi-preset:hover,
  .roi-result:hover,
  .roi-scenario:hover {
    transform: none !important;
  }

  /* Use :active for tactile feedback instead */
  .roi-btn:active,
  .roi-preset:active,
  .roi-scenario:active {
    background: rgba(15,65,70,.06) !important;
  }

  .roi-result:active {
    box-shadow: 0 2px 10px rgba(15,65,70,.1) !important;
  }

  .roi-tier:active {
    border-color: rgba(15,65,70,.25) !important;
  }
}

/* Narrow screens */
@media (max-width: 480px) {
  /* Ensure range inputs are fat enough to thumb-drag */
  input[type="range"] {
    height: 32px;
    min-height: 32px;
  }

  /* Stack flagship rows vertically */
  .roi-flag {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }

  /* Toggle pill: ensure text doesn't clip */
  .roi-toggle-pill .roi-btn {
    padding: 10px 12px !important;
    font-size: 12px !important;
  }
}


/* Email form placeholder */
.roi-lead-input::placeholder {
  color: rgba(255, 255, 255, 0.5) !important;
  opacity: 1;
}
.roi-lead-input::-webkit-input-placeholder { color: rgba(255, 255, 255, 0.5) !important; }
.roi-lead-input::-moz-placeholder { color: rgba(255, 255, 255, 0.5) !important; }

  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
  <script>
    // Pre-load jsPDF with multi-CDN fallback
    (function(){
      var cdns = [
        ["https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js","https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"],
        ["https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js","https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"],
        ["https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js","https://unpkg.com/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"]
      ];
      function tryLoad(i){
        if(i>=cdns.length||window.jspdf)return;
        var s1=document.createElement("script");s1.src=cdns[i][0];
        s1.onload=function(){
          var s2=document.createElement("script");s2.src=cdns[i][1];
          s2.onerror=function(){tryLoad(i+1);};
          document.head.appendChild(s2);
        };
        s1.onerror=function(){tryLoad(i+1);};
        document.head.appendChild(s1);
      }
      tryLoad(0);
    })();
  </script>

  <script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

/* ═══════════════════════════════════════════════════════════════════════
   HOOKS
   ═══════════════════════════════════════════════════════════════════════ */

function useCountUp(target, duration = 1200, active = true) {
  const [display, setDisplay] = useState(0);
  const ref = useRef({ from: 0, to: 0, startTime: 0, raf: null, hasRun: false });
  useEffect(() => {
    if (!active) { setDisplay(0); ref.current.hasRun = false; return; }
    const r = ref.current;
    const from = r.hasRun ? display : 0;
    const dur = r.hasRun ? 600 : duration;
    r.from = from; r.to = target; r.startTime = performance.now(); r.hasRun = true;
    if (r.raf) cancelAnimationFrame(r.raf);
    const tick = (now) => {
      const p = Math.min((now - r.startTime) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(r.from + (r.to - r.from) * eased);
      if (p < 1) r.raf = requestAnimationFrame(tick);
    };
    r.raf = requestAnimationFrame(tick);
    return () => { if (r.raf) cancelAnimationFrame(r.raf); };
  }, [target, active]);
  return Math.round(display);
}
function AnimatedNum({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v.toLocaleString("en-GB")}</span>; }
function AnimatedK({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v >= 1e6 ? `£${(v/1e6).toFixed(1)}m` : v >= 1000 ? `£${Math.round(v/1000).toLocaleString("en-GB")}k` : `£${v.toLocaleString("en-GB")}`}</span>; }

/* ═══════════════════════════════════════════════════════════════════════
   CALC ENGINE – tiered systems, bed-scaled costs, no parallel-run
   ═══════════════════════════════════════════════════════════════════════ */

const SCENARIO = {
  CONSERVATIVE: { decom_pct: 0.85, realisation: 0.20, safety: 0.15 },
  EXPECTED:     { decom_pct: 1.00, realisation: 0.30, safety: 0.25 },
  STRETCH:      { decom_pct: 1.10, realisation: 0.40, safety: 0.35 },
};
const CX = { LOW: 0.7, TYPICAL: 1.0, HIGH: 1.45 };
const DQ = { CLEAN: 0.75, MIXED: 1.0, POOR: 1.4 };

function tierCost(tier, beds, cx) {
  const base = tier === "enterprise" ? 300000 : tier === "departmental" ? 75000 : 14000;
  const perBed = tier === "enterprise" ? 700 : tier === "departmental" ? 160 : 20;
  return Math.round(((base + beds * perBed) * cx) / 1000) * 1000;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function calc(inp, mode, ov = {}, flagships = []) {
  const sc = SCENARIO[mode], cx = CX[inp.complexity_level], dq = DQ[inp.data_quality_level];
  const isArchiveOnly = inp.journey === "HAVE_EPR";
  const ent = ov.enterprise != null ? ov.enterprise : inp.tiers.enterprise;
  const dep = ov.departmental != null ? ov.departmental : inp.tiers.departmental;
  const nic = ov.niche != null ? ov.niche : inp.tiers.niche;
  const tieredLegacy = ent + dep + nic;
  const entCost = ov.entCost != null ? ov.entCost : tierCost("enterprise", inp.bed_count, cx);
  const depCost = ov.depCost != null ? ov.depCost : tierCost("departmental", inp.bed_count, cx);
  const nicCost = ov.nicCost != null ? ov.nicCost : tierCost("niche", inp.bed_count, cx);
  const tieredEstate = ent * entCost + dep * depCost + nic * nicCost;
  // Flagships
  const flagshipTotal = flagships.reduce((s,f) => s + (f.cost || 0), 0);
  const flagshipDecomSave = flagships.filter(f => f.retire).reduce((s,f) => s + (f.cost || 0), 0);
  const flagshipCount = flagships.length;
  const flagshipRetireCount = flagships.filter(f => f.retire).length;
  const legacy = tieredLegacy + flagshipCount;
  const totalEstate = tieredEstate + flagshipTotal;
  const blendedCost = legacy > 0 ? Math.round(totalEstate / legacy) : 0;
  const rawDecom = tieredLegacy * inp.decom_retire_rate * sc.decom_pct;
  const decom = Math.min(Math.round(rawDecom), tieredLegacy) + flagshipRetireCount;
  const decomFrac = tieredLegacy > 0 ? Math.min(Math.round(rawDecom), tieredLegacy) / tieredLegacy : 0;
  const entDecom = Math.min(Math.round(ent * decomFrac), ent);
  const depDecom = Math.min(Math.round(dep * decomFrac), dep);
  const nicDecom = clamp(Math.min(Math.round(rawDecom), tieredLegacy) - entDecom - depDecom, 0, nic);
  const decomSave = entDecom * entCost + depDecom * depCost + nicDecom * nicCost + Math.round(flagshipDecomSave * sc.decom_pct);
  const corpPerOrg = Math.min(80, Math.round(CORPORATE_STAFF_BASE + (inp.bed_count / Math.max(1, inp.org_count)) * CORPORATE_STAFF_PER_BED));
  const totalStaff = Math.round(inp.bed_count * STAFF_PER_BED + inp.org_count * corpPerOrg);
  const clinicians = ov.clinicians != null ? ov.clinicians : Math.round(totalStaff * ACTIVE_USER_PCT);
  const systemsPerUser = Math.max(2, Math.round(legacy * SYSTEM_EXPOSURE_PCT));
  const switchPenalty = Math.min(Math.max(0, systemsPerUser - 1) * SWITCH_PENALTY_PER_SYSTEM, 4.0);
  const baseMin = isArchiveOnly ? 5 : 12;
  const minsWasted = ov.minsWasted != null ? ov.minsWasted : Math.round(baseMin * dq * cx * (1 + switchPenalty));
  const residual = isArchiveOnly ? 1 : 2;
  const hrsSaved = Math.round((clinicians * Math.max(0, minsWasted - residual) * WORKING_WEEKS) / 60);
  const timeSave = Math.round(hrsSaved * BLENDED_HOURLY_RATE * sc.realisation);
  const ticketsBaselineMonthly = ov.ticketsBaseline != null ? ov.ticketsBaseline : Math.round(legacy * TICKETS_PER_SYSTEM * dq);
  const ticketsAfter = Math.min(Math.round((legacy - decom) * TICKETS_PER_SYSTEM * dq * SURVIVING_SYSTEM_TICKET_FACTOR), ticketsBaselineMonthly);
  const ticketsReductionPct = Math.round((ticketsBaselineMonthly - ticketsAfter) / Math.max(1, ticketsBaselineMonthly) * 100);
  const sarDaysBefore = ov.sarDaysBefore != null ? ov.sarDaysBefore : Math.round((SAR_BASE_DAYS + legacy * SAR_DAYS_PER_SYSTEM_BEFORE * dq) * 10) / 10;
  const sarDaysAfter = Math.min(Math.round((SAR_BASE_DAYS + (legacy - decom) * SAR_DAYS_PER_SYSTEM_AFTER) * 10) / 10, sarDaysBefore);
  const sarReductionPct = Math.round((sarDaysBefore - sarDaysAfter) / Math.max(1, sarDaysBefore) * 100);
  const hasClinicalScope = legacy >= 3 && inp.bed_count > 0;
  let safetyMedErrorsAvoided=0, safetyPatientsProtected=0, safetyBedDaysAvoided=0, safetyMedErrorsBaseline=0;
  if (hasClinicalScope) {
    const frag = 0.6 + Math.min(legacy, 20) / 20 * 0.6;
    safetyMedErrorsBaseline = Math.round(inp.bed_count * MED_ERRORS_PER_BED * frag * dq);
    const harmedBl = Math.round(inp.bed_count * PATIENTS_HARMED_PER_BED * frag * dq);
    const bedDaysBl = Math.round(inp.bed_count * EXCESS_BED_DAYS_PER_BED * frag * dq);
    safetyMedErrorsAvoided = Math.round(safetyMedErrorsBaseline * sc.safety);
    safetyPatientsProtected = Math.round(harmedBl * sc.safety);
    safetyBedDaysAvoided = Math.round(bedDaysBl * sc.safety);
  }
  const annual = decomSave + timeSave;
  // Phased ramp: 3yr [40,80,100] or 5yr [20,40,60,80,100]
  const rampYears = inp._rampYears || 3;
  const rampPcts = rampYears === 5 ? [0.20, 0.40, 0.60, 0.80, 1.00] : [0.40, 0.80, 1.00];
  const yrValues = rampPcts.map(p => Math.round(annual * p));
  const totalRamp = yrValues.reduce((a, b) => a + b, 0);
  // Backwards compatibility for existing references
  const y1Pct = rampPcts[0], y2Pct = rampPcts[1] || 0, y3Pct = rampPcts[2] || 0;
  const yr1 = yrValues[0], yr2 = yrValues[1] || 0, yr3 = yrValues[2] || 0;
  const total3 = totalRamp;
  return {
    legacy, ent, dep, nic, entCost, depCost, nicCost, blendedCost, totalEstate,
    decom, entDecom, depDecom, nicDecom, decomSave,
    totalStaff, clinicians, systemsPerUser, minsWasted, hrsSaved, timeSave, baseMin,
    ticketsBaselineMonthly, ticketsAfter, ticketsReductionPct,
    sarDaysBefore, sarDaysAfter, sarReductionPct,
    hasClinicalScope, safetyMedErrorsAvoided, safetyPatientsProtected,
    safetyBedDaysAvoided, safetyMedErrorsBaseline,
    annual, total3, totalRamp, rampYears, rampPcts, yrValues, yr1, yr2, yr3, y1Pct, y2Pct, y3Pct, realisation: sc.realisation, isArchiveOnly,
    fteEquivalent: Math.round(hrsSaved * sc.realisation / 1820 * 10) / 10,  // NHS FTE = 1820 hrs (8.4 hrs/day x 5 days x 52 weeks - leave)
    flagshipTotal, flagshipDecomSave: Math.round(flagshipDecomSave * sc.decom_pct),
    flagshipCount, flagshipRetireCount,
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   PRESETS
   ═══════════════════════════════════════════════════════════════════════ */

const emptyDt = () => ({ EPR_PAS:0,ED:0,MATERNITY:0,THEATRES:0,LAB:0,RAD_REPORTS:0,PACS_LINKS:0,DOC_ECM:0,SCANNED_NOTES:0,REFERRALS:0,COMMUNITY:0,MENTAL_HEALTH:0,OTHER:0 });
const PRESETS = {
  SMALL: { label:"Specialist / Smaller Trust", desc:"~250 beds · 1 org · 8 systems", data:{ bed_count:250, org_count:1, journey:"HAVE_EPR", tiers:{enterprise:0,departmental:3,niche:5}, data_types:{...emptyDt(),EPR_PAS:1,DOC_ECM:1,SCANNED_NOTES:1,RAD_REPORTS:1}, complexity_level:"LOW", data_quality_level:"MIXED", decom_retire_rate:0.75 }},
  TYPICAL: { label:"Typical Acute Trust", desc:"~800 beds · 1 org · 15 systems", data:{ bed_count:800, org_count:1, journey:"EVALUATING", tiers:{enterprise:1,departmental:5,niche:9}, data_types:{...emptyDt(),EPR_PAS:1,ED:1,THEATRES:1,LAB:1,RAD_REPORTS:1,DOC_ECM:1,SCANNED_NOTES:1}, complexity_level:"TYPICAL", data_quality_level:"MIXED", decom_retire_rate:0.75 }},
  LARGE: { label:"Large Acute Trust", desc:"~1400 beds · 1 org · 25 systems", data:{ bed_count:1400, org_count:1, journey:"EVALUATING", tiers:{enterprise:2,departmental:8,niche:15}, data_types:{...emptyDt(),EPR_PAS:1,ED:1,THEATRES:1,LAB:2,RAD_REPORTS:1,DOC_ECM:2,SCANNED_NOTES:1,MATERNITY:1,COMMUNITY:1}, complexity_level:"HIGH", data_quality_level:"MIXED", decom_retire_rate:0.75 }},
  REGIONAL: { label:"Multi-Trust / Regional Programme", desc:"~3500 beds · 4 orgs · 70+ systems", data:{ bed_count:3500, org_count:4, journey:"EVALUATING", tiers:{enterprise:5,departmental:22,niche:45}, data_types:{...emptyDt(),EPR_PAS:3,ED:2,THEATRES:2,LAB:3,RAD_REPORTS:2,DOC_ECM:3,SCANNED_NOTES:2,MATERNITY:2,COMMUNITY:2,MENTAL_HEALTH:1,REFERRALS:1}, complexity_level:"HIGH", data_quality_level:"POOR", decom_retire_rate:0.70 }},
};

// ── Model constants ──
const STAFF_PER_BED = 2.8;
const CORPORATE_STAFF_BASE = 20;       // Base admin/corporate staff per organisation
const CORPORATE_STAFF_PER_BED = 0.12;  // Scales with size, caps at ~80 for large Trusts
const BLENDED_HOURLY_RATE = 55;
const WORKING_WEEKS = 48;
const TICKETS_PER_SYSTEM = 2.5;
const SWITCH_PENALTY_PER_SYSTEM = 0.04;  // Bartek et al JIMI 2023: 3% switch cost (beta=0.03); 4% conservative
const SURVIVING_SYSTEM_TICKET_FACTOR = 0.6;
const SAR_BASE_DAYS = 1.5;
const SAR_DAYS_PER_SYSTEM_BEFORE = 0.4;
const SAR_DAYS_PER_SYSTEM_AFTER = 0.15;

// Clinical engagement factors
const ACTIVE_USER_PCT = 0.65;           // Sinsky et al 2016; KLAS Arch Collaborative (500k+ clinicians). 65% conservative
const SYSTEM_EXPOSURE_PCT = 0.35;       // Modeled assumption: role-based access patterns
const MED_ERRORS_PER_BED = 18;
const PATIENTS_HARMED_PER_BED = 0.315;
const EXCESS_BED_DAYS_PER_BED = 0.365;


// ── Known EPR/PAS systems (UK & Ireland) ──
const KNOWN_SYSTEMS = [
  // Cost = baseCost + (perBed * bed_count). Calibrated to UK NHS contract benchmarks.
  { label: "Epic", baseCost: 2000000, perBed: 5000, type: "EPR" },
  { label: "Oracle Health (Cerner) Millennium", baseCost: 1200000, perBed: 3200, type: "EPR" },
  { label: "Dedalus Lorenzo", baseCost: 800000, perBed: 2200, type: "PAS/EPR" },
  { label: "TPP SystmOne", baseCost: 1000000, perBed: 2500, type: "EPR" },
  { label: "System C Careflow", baseCost: 250000, perBed: 450, type: "PAS/EPR" },
  { label: "MEDITECH Expanse", baseCost: 600000, perBed: 1500, type: "EPR" },
  { label: "InterSystems TrakCare", baseCost: 500000, perBed: 1200, type: "EPR" },
  { label: "Allscripts / Altera", baseCost: 350000, perBed: 700, type: "EPR" },
  { label: "IMS MAXIMS", baseCost: 250000, perBed: 450, type: "PAS" },
  { label: "Civica Paris", baseCost: 180000, perBed: 260, type: "PAS" },
  { label: "Cambio COSMIC", baseCost: 300000, perBed: 550, type: "EPR" },
  { label: "Nervecentre", baseCost: 250000, perBed: 600, type: "e-Obs" },
  { label: "CliniSys Winpath LIMS", baseCost: 150000, perBed: 200, type: "LIMS" },
  { label: "Varian ARIA", baseCost: 800000, perBed: 1400, type: "Oncology" },
  { label: "EMIS Health", baseCost: 120000, perBed: 180, type: "Clinical" },
  { label: "System C Badgernet", baseCost: 80000, perBed: 100, type: "Maternity/Neonatal" },
  { label: "BigHand", baseCost: 100000, perBed: 120, type: "Dictation" },
  { label: "WellSky (JAC) Pharmacy", baseCost: 120000, perBed: 150, type: "Pharmacy" },

    const pdf = await generatePDF(true);
    if (!pdf) { setLeadSending(false); return; }

    // 2. Always download locally
    const url = URL.createObjectURL(pdf.blob);
    const a = document.createElement("a"); a.href = url; a.download = pdf.filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);

    // 3. Submit to HubSpot (EU1 region, fire-and-forget)
    if (HUBSPOT_PORTAL_ID && HUBSPOT_FORM_GUID) {
      try {
        const scenarioLabel = am==="CONSERVATIVE"?"Conservative":am==="STRETCH"?"Stretch":"Expected";
        const calcContext = `ROI Calculator submission | Scenario: ${scenarioLabel} | Beds: ${inputs.bed_count} | Orgs: ${inputs.org_count} | Legacy systems: ${r.legacy} | Annual savings: ${fmtK(r.annual)} | 3-year total: ${fmtK(r.total3)} | Complexity: ${inputs.complexity_level} | Journey: ${isArchiveOnly?"Archive only":"Migration + archiving"}`;
        await fetch(`https://forms-${HUBSPOT_REGION}.hsforms.com/submissions/v3/integration/submit/${HUBSPOT_PORTAL_ID}/${HUBSPOT_FORM_GUID}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            fields: [
              { name: "firstname", value: leadForm.name.split(" ")[0] },
              { name: "lastname", value: leadForm.name.split(" ").slice(1).join(" ") || "" },
              { name: "email", value: leadForm.email },
              { name: "company", value: leadForm.org || "" },
              { name: "jobtitle", value: leadForm.role || "" },
              { name: "message", value: calcContext },
            ],
            context: {
              pageUri: window.location.href,
              pageName: "ROI Calculator",
            },
            legalConsentOptions: {
              consent: {
                consentToProcess: true,
                text: "I agree to receive communications about my ROI estimate.",
              },
            },
          }),
        });
      } catch (e) { console.warn("HubSpot submission failed:", e); }
    }

    // 4. Send PDF via email endpoint (fire-and-forget)
    if (EMAIL_ENDPOINT) {
      try {
        const reader = new FileReader();
        reader.onload = async () => {
          const base64 = reader.result.split(",")[1];
          try {
            await fetch(EMAIL_ENDPOINT, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                to: leadForm.email,
                name: leadForm.name,
                org: leadForm.org || "",
                role: leadForm.role || "",
                filename: pdf.filename,
                pdf_base64: base64,
                scenario: am==="CONSERVATIVE"?"Conservative":am==="STRETCH"?"Stretch":"Expected",
                annual: r.annual,
                total3: r.total3,
              }),
            });
          } catch (e) { console.warn("Email endpoint failed:", e); }
        };
        reader.readAsDataURL(pdf.blob);
      } catch (e) { console.warn("PDF encoding failed:", e); }
    }

    setLeadSending(false);
    setLeadSubmitted(true);

        {/* Year-by-year stacked bar chart */}

      const maxYr = Math.max(...years.map(y=>total*y.pct));
      return <Card style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>

        <div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}>
          {segs.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.textMid}}>
            <div style={{width:10,height:10,borderRadius:2,background:s.color}}/>
            {s.label}
          </div>)}
        </div>
      </Card>;
    })()}

        <span>Range: <strong>{fmtK(rCon.totalRamp)}</strong> {"–"} <strong>{fmtK(rStr.totalRamp)}</strong></span>

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <h3 style={{fontSize:14,fontWeight:700,margin:0,color:C.text}}>Sensitivity check</h3>
          <span style={{fontSize:9,fontWeight:600,padding:"2px 8px",borderRadius:20,background:"#e8f5f0",color:"#0F4146"}}>How robust is your number?</span>

        <p style={{fontSize:12,color:C.textMuted,margin:"0 0 14px"}}>If our key assumptions are off, your savings would still look like this:</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:10}}>

    {/* ── Full Methodology ── */}
    {!dim && (() => {
      const S = ({title, children, defaultOpen}) => {
        const [open, setOpen] = useState(defaultOpen || false);
        return <div style={{borderBottom:`1px solid ${C.borderLight}`}}>
          <button type="button" onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"13px 0",background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,color:C.text,textAlign:"left"}}>
            <span>{title}</span>
            <span style={{fontSize:16,color:C.textMuted,transform:open?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0,marginLeft:8}}>{"\u25be"}</span>
          </button>
          {open && <div style={{paddingBottom:16,fontSize:13,lineHeight:1.7,color:C.textMid}}>{children}</div>}
        </div>;
      };
      const Tag = ({label, color, source}) => {
        const [hover, setHover] = useState(false);
        return <span style={{position:"relative",display:"inline-block",marginLeft:6,verticalAlign:"middle"}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
          <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:color||C.accentPale,color:color?"#fff":C.accent,cursor:source?"help":"default"}}>{label}</span>
          {hover && source && <span style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",fontSize:11,lineHeight:1.5,padding:"8px 12px",borderRadius:6,width:260,maxWidth:"80vw",boxShadow:"0 4px 16px rgba(0,0,0,.22)",zIndex:20,pointerEvents:"none",fontWeight:400,whiteSpace:"normal"}}>{source}</span>}
        </span>;
      };
      const Ev = ({s}) => <Tag label="Evidence-based" color={C.green} source={s}/>;
      const Bm = ({s}) => <Tag label="Industry benchmark" color="#1a7a7a" source={s}/>;
      const Bn = ({s}) => <Tag label="Benchmarked" color="#8a6d2b" source={s}/>;
      const Md = ({s}) => <Tag label="Modelled estimate" color={C.textMuted} source={s}/>;
      const F = ({children}) => <div style={{padding:"12px 16px",background:C.bg,borderRadius:8,margin:"10px 0",fontFamily:"'FK Grotesk Neue','FK Grotesk',monospace",fontSize:12,color:C.text,lineHeight:1.6}}>{children}</div>;

      return <Card style={{marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:20}}>{"\ud83d\udcd0"}</span>
          <h3 style={{fontSize:17,fontWeight:800,margin:0,color:C.text}}>How we calculated this</h3>
        </div>
        <p style={{fontSize:13,color:C.textMuted,margin:"4px 0 12px"}}>Full methodology, formulae and evidence base. Every figure marked {"\u270e"} in the calculator is overridable.</p>

        <S title="1. Scenario multipliers" defaultOpen={true}>
          <p style={{margin:"0 0 8px"}}>Three scenarios scale all outputs to reflect confidence levels.</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Parameter</th><th style={{padding:"6px 10px"}}>Conservative</th><th style={{padding:"6px 10px"}}>Expected</th><th style={{padding:"6px 10px"}}>Stretch</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Decommission scaling</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.85x</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00x</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.10x</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Time realisation rate</td><td style={{padding:"6px 10px",textAlign:"center"}}>20%</td><td style={{padding:"6px 10px",textAlign:"center"}}>30%</td><td style={{padding:"6px 10px",textAlign:"center"}}>40%</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Safety reduction</td><td style={{padding:"6px 10px",textAlign:"center"}}>15%</td><td style={{padding:"6px 10px",textAlign:"center"}}>25%</td><td style={{padding:"6px 10px",textAlign:"center"}}>35%</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Decom scaling</strong> adjusts how many of your planned retirements actually happen {" - "} Conservative assumes 85% (programme delays, contractual holdups), Stretch assumes 10% overachievement. <Md s="No published benchmark. User sets their own target and this scales it."/></p>
          <p style={{margin:"4px 0"}}><strong>Time realisation</strong> {" - "} the fraction of freed clinician time that translates into measurable capacity. NHS Productive Ward reported 20-40%. <Bm s="NHS Productive Ward programme; Lord Carter review of operational productivity."/></p>
          <p style={{margin:"4px 0"}}><strong>Safety reduction</strong> {" - "} avoidable medication errors from system consolidation. Camacho et al 2024 (BMJ Quality & Safety), Gate et al 2023 found 25-50% reductions. <Ev s="Camacho et al 2024 (BMJ Quality & Safety); Gate et al 2023."/></p>
        </S>

        <S title="2. System cost estimation">
          <p style={{margin:"0 0 8px"}}>Each legacy system is classified into one of three tiers. Annual cost scales with bed count and complexity.</p>
          <F>tierCost = round((base + beds {"\u00d7"} perBed) {"\u00d7"} complexity / 1000) {"\u00d7"} 1000</F>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Tier</th><th style={{padding:"6px 10px"}}>Base</th><th style={{padding:"6px 10px"}}>Per bed</th><th style={{padding:"6px 10px"}}>800 beds (Typical)</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Enterprise</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}300k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}700/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"\u00a3"}860k/yr</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Departmental</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}75k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}160/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"\u00a3"}203k/yr</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Standalone</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}14k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}20/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"\u00a3"}30k/yr</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>These formulas were calibrated against real contract data from a large acute NHS Trust (~1,385 beds, 42 legacy systems). Default estimates cover ~80% of actual estate value. <Bn s="Validated against contract register from a large acute NHS Trust (~1,385 beds, 42 systems, 2024/25 data)."/></p>
          <p style={{margin:"4px 0"}}>The complexity multiplier adjusts costs: Low 0.70, Typical 1.00, High 1.45. <Md s="Calibrated to produce approximately +/-30% variation. Benchmarked Trust classified as HIGH (1.45)."/></p>
          <p style={{margin:"4px 0"}}>For trusts with known contract values, click any tier cost to override it, add named flagship systems with actual costs, or use {"\u201c"}I know my spend{"\u201d"} mode to enter your total directly.</p>
        </S>

        <S title="3. Decommission savings">
          <p style={{margin:"0 0 8px"}}>The primary financial benefit: retiring legacy systems eliminates their annual running costs.</p>
          <F>1. Set decom target (default 75%)<br/>2. rawDecom = totalSystems {"\u00d7"} decomTarget {"\u00d7"} scenarioMultiplier<br/>3. Systems retired pro-rata across tiers<br/>4. decomSave = (entRetired {"\u00d7"} entCost) + (depRetired {"\u00d7"} depCost) + (nicRetired {"\u00d7"} nicCost) + flagshipSave</F>
          <p style={{margin:"8px 0 4px"}}><strong>75% default decom target</strong> {" - "} most NHS EPR programmes plan to retire 60-80% of legacy systems. Some are retained for long-retention data or functions not covered by the new EPR. Validated against a real Trust where ~32 of 42 systems were candidates for retirement. <Bm s="NHS EPR programme consensus; validated against benchmarked Trust application footprint."/></p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems</strong> flagged as {"\u201c"}Retire{"\u201d"} are decommissioned at their full stated contract value, scaled by the scenario multiplier.</p>
        </S>

        <S title="4. Clinician time savings">
          <p style={{margin:"0 0 8px"}}>Time freed when clinicians no longer switch between multiple legacy systems.</p>
          <F>corpPerOrg = min(80, 20 + bedsPerOrg {"\u00d7"} 0.12)<br/>totalStaff = beds {"\u00d7"} 2.8 + orgs {"\u00d7"} corpPerOrg<br/>clinicians = totalStaff {"\u00d7"} 65% (active system users)<br/>systemsPerUser = legacy {"\u00d7"} 35% (exposure per clinician)<br/>minsWasted = baseMin {"\u00d7"} DQ {"\u00d7"} CX {"\u00d7"} (1 + switchPenalty)<br/>switchPenalty = min(max(0, systemsPerUser - 1) {"\u00d7"} 0.04, 4.0)<br/>hrsSaved = clinicians {"\u00d7"} (minsWasted - residual) {"\u00d7"} 48wks / 60<br/>timeSave = hrsSaved {"\u00d7"} {"\u00a3"}55/hr {"\u00d7"} realisationRate</F>
          <p style={{margin:"8px 0 4px"}}><strong>2.8 staff per bed</strong> {" - "} NHS workforce stats 2023/24 show 2.6-3.0 clinical full-time equivalents (FTEs) per acute bed (doctors, nurses, allied health professionals (AHPs), pharmacists). <Ev s="NHS Digital workforce statistics 2023/24; Lord Carter operational productivity review."/></p>
          <p style={{margin:"4px 0"}}><strong>12 min/wk base</strong> (migration path) {" - "} Westbrook et al 2010 (JAMIA) found nurses interrupted 3-6 times/hour by system-switching. Nuffield Trust 2020 estimated 15-20 min/day lost to system navigation. Our 12 min/week is conservative (reducible portion only). Archive-only uses 5 min/wk. <Ev s="Westbrook et al 2010 (JAMIA); Nuffield Trust 2020 system navigation study."/></p>
          <p style={{margin:"4px 0"}}><strong>+4% per system</strong> {" - "} each additional legacy system adds cognitive overhead. At 42 systems (as in the benchmarked Trust), this produces ~10 min/day wasted, consistent with published studies. <Md s="First-principles switching cost model. Validated against benchmarked Trust (42 systems)."/></p>
          <p style={{margin:"4px 0"}}><strong>{"\u00a3"}55/hr blended rate</strong> {" - "} NHS Agenda for Change (AfC) mid-band including on-costs. Band 5 nurse ~{"\u00a3"}40-45/hr, consultants ~{"\u00a3"}80-120/hr. Weighted towards nursing (largest user group). <Ev s="NHS Employers Agenda for Change pay scales 2024/25."/></p>
        </S>

        <S title="5. Support tickets & subject access request (SAR) turnaround">
          <p style={{margin:"0 0 8px"}}><strong>Tickets:</strong> 2.5 per system/month baseline (IT Infrastructure Library / ITIL service desk metrics). Surviving systems generate 40% fewer tickets due to consolidated support. <Bm s="ITIL service desk reporting in NHS trusts; 0.6 factor is a modelled estimate."/></p>
          <p style={{margin:"4px 0"}}><strong>Subject access request (SAR) turnaround:</strong> 1.5 day base + 0.4 days per system (before), 0.15 days per surviving system (after). The Information Commissioner's Office (ICO) requires searching all systems where patient data may be held. At 42 systems, this produces ~18 working days per SAR {" - "} consistent with reports from trusts with fragmented estates. <Md s="Consistent with NHS IG team reports. Validated against benchmarked Trust."/></p>
        </S>

        <S title="6. Patient safety metrics">
          <p style={{margin:"0 0 8px"}}>These are <strong>not included</strong> in the financial ROI total. They provide qualitative context for the patient safety case.</p>
          <F>medErrors = beds {"\u00d7"} 18 {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>patientsHarmed = beds {"\u00d7"} 0.315 {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>excessBedDays = beds {"\u00d7"} 0.365 {"\u00d7"} fragmentation {"\u00d7"} DQ</F>
          <p style={{margin:"8px 0 4px"}}><strong>18 medication errors per bed/yr</strong> {" - "} Camacho et al 2024 reported ~1.8M medication errors at care transitions across NHS England (~100k acute beds). <Ev s="Camacho et al 2024 (BMJ Quality & Safety), 1.8M errors / ~100K beds."/></p>
          <p style={{margin:"4px 0"}}><strong>0.315 patients harmed per bed/yr</strong> and <strong>0.365 excess bed days per bed/yr</strong> {" - "} both from Camacho et al 2024. <Ev s="Camacho et al 2024: 31,500 patients harmed and 36,500 excess bed days annually."/></p>
          <p style={{margin:"4px 0"}}><strong>Fragmentation index</strong> (0.6-1.2) scales risk by number of systems. Caps at 20 systems (diminishing marginal fragmentation). <Md s="No published fragmentation index exists. Designed to produce sensible scaling without overstating."/></p>
          <p style={{margin:"4px 0"}}><strong>Litigation context:</strong> NHS trusts collectively pay {"\u00a3"}3.6bn/yr in clinical negligence settlements (National Audit Office, October 2025). {"\u00a3"}60bn total provision (NHS Resolution 2024/25). Clinical Negligence Scheme for Trusts (CNST) premiums are directly influenced by claims history. No per-trust figure is fabricated {" - "} the mechanism is real but not directly quantifiable at trust level. <Ev s="National Audit Office Oct 2025; NHS Resolution Annual Report 2024/25."/></p>
        </S>

        <S title="7. Real-world validation">
          <p style={{margin:"0 0 8px"}}>All tier cost formulas were validated against the complete application footprint and contract register of a large acute NHS Trust (~1,385 beds, dual-site merged estate).</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Method</th><th style={{padding:"6px 10px"}}>Expected result</th><th style={{padding:"6px 10px"}}>vs {"\u00a3"}16m target</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Defaults only</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}11.9m/yr</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u221226%"}</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Tier cost overrides</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"\u00a3"}16.4m/yr</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700,color:C.green}}>{"+2.5%"}</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Flagships + overrides</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"\u00a3"}19.0m/yr</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"+19%"}</td></tr>
              <tr><td style={{padding:"6px 10px"}}>{"\u201c"}I know my spend{"\u201d"} mode</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"\u00a3"}16.4m/yr</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700,color:C.green}}>{"+2.5%"}</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>The Trust had 42 unique systems (3 enterprise, 15 departmental, 24 standalone) with {"\u00a3"}16.75m/yr total contract value. Four systems accounted for 78% of spend {" - "} exactly the pattern the flagship feature captures. The stated {"\u00a3"}16m/yr saving estimate falls between Conservative and Expected, confirming the scenario corridor brackets real-world figures.</p>
        </S>

        <S title="8. Complexity and data quality adjustments">
          <p style={{margin:"0 0 8px"}}>Two multipliers adjust the model for your specific environment.</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Setting</th><th style={{padding:"6px 10px"}}>Low / Clean</th><th style={{padding:"6px 10px"}}>Typical / Mixed</th><th style={{padding:"6px 10px"}}>High / Poor</th><th style={{padding:"6px 10px"}}>What it affects</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Complexity</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.70</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.45</td><td style={{padding:"6px 10px"}}>System costs, minutes wasted</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Data quality</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.75</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.40</td><td style={{padding:"6px 10px"}}>Minutes wasted, tickets, SAR time</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Complexity</strong> reflects how bespoke and integrated your legacy systems are. Low means off-the-shelf with simple interfaces. High means heavily customised systems with deep integrations and complex data models. Higher complexity increases both per-system costs (more expensive to run) and clinician time wasted (harder to navigate). <Md s="Designed to produce approximately +/-30% variation around baseline, consistent with observed range across NHS trusts."/></p>
          <p style={{margin:"4px 0"}}><strong>Data quality</strong> affects how long clinicians spend searching for information. Clean data means well-structured records with consistent coding. Poor data means duplicate records, missing fields, and inconsistent formats. Poor quality roughly doubles the effort of finding information compared to clean data. <Md s="Modelled estimate. Poor data approximately doubles effort vs clean data."/></p>
        </S>

        <S title="9. How the three input modes work">
          <p style={{margin:"0 0 8px"}}>You can provide cost data at three levels of detail, depending on what you know about your legacy estate.</p>
          <p style={{margin:"4px 0"}}><strong>Estimate (default):</strong> The calculator uses the bed-scaled tier cost formulas to estimate your annual legacy spend. Best when you do not have contract data available. In benchmarking, this covered approximately 80% of a real Trust's actual estate value.</p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems:</strong> Add your highest-cost systems individually with their actual contract values (for example, a legacy PAS at {"\u00a3"}3m/yr). The remaining systems are still costed through the tier formulas. This captures outlier contracts that generic formulas underestimate.</p>
          <p style={{margin:"4px 0"}}><strong>"I know my spend" mode:</strong> Enter your total annual legacy system spend. The calculator distributes it across tiers using a 5:2:1 weighting ratio (enterprise : departmental : standalone). You can then click any derived tier cost to fine-tune. In benchmarking, this mode produced results within 2.5% of the stated estimate.</p>
          <p style={{margin:"4px 0"}}>In all modes, you can click any individual tier cost to override it with your actual figure.</p>
        </S>

        <S title="10. What is included and excluded">
          <p style={{margin:"0 0 8px"}}><strong>Included:</strong> Decommission savings (licence, hosting, support costs eliminated) and clinician time capacity value (hours freed, valued at blended rate with realisation discount).</p>
          <p style={{margin:"4px 0"}}><strong>Excluded:</strong> Implementation costs (covered in main business case), parallel-run costs (too variable to model), data migration costs (one-off programme budget), clinical safety in financial terms (kept qualitative), Clinical Negligence Scheme for Trusts (CNST) premium reductions (mechanism real but not quantifiable per trust).</p>
          <p style={{margin:"4px 0"}}>The 3-year total assumes flat annual savings. In practice, savings may increase in years 2-3 as more systems are retired, or decrease as easy wins are captured first.</p>
        </S>

        <div style={{marginTop:12,padding:"10px 14px",background:C.bg,borderRadius:8,fontSize:11,color:C.textMuted,lineHeight:1.6}}>
          Tier cost formulas benchmarked against real-world NHS contract data from a large acute NHS Trust. All figures are user-overridable. For the complete audit trail with full citations, see the methodology report.
        </div>
      </Card>;
    })()}

    {/* Methodology version */}
    <div style={{maxWidth:900,margin:"24px auto 0",padding:"0 24px",fontSize:11,color:C.textMuted,textAlign:"center"}}>
      Methodology v3.0 — last reviewed May 2026 — next review November 2026
    </div>

    {/* Disclaimer */}
    <div style={{marginTop:24,padding:"16px 20px",background:C.bg,borderRadius:10,border:`1px solid ${C.borderLight}`,fontSize:11,color:C.textMuted,lineHeight:1.7}}>
      <div style={{fontWeight:700,fontSize:12,marginBottom:4,color:C.textMid}}>Important disclaimer</div>
      This report presents indicative estimates only, generated from generalised assumptions and industry-level benchmarks. It does not constitute a guaranteed ROI, a binding savings target, or professional financial, legal, or clinical advice. Actual outcomes will vary based on your organisation{"'"}s specific circumstances, contract terms, implementation approach, and operational factors not captured by this model. All projected figures, including decommission savings and quality metrics, are scenario-modelled approximations and should be independently validated before being used to support investment decisions. No liability is accepted for decisions made in reliance on these estimates. Consult qualified advisors for guidance specific to your organisation.
    </div>

    <button type="button" onClick={()=>{setPage("inputs");scrollToTop();}} className="roi-btn" style={{marginTop:20,padding:"12px 28px",background:"#fff",color:C.textMid,border:`1px solid ${C.border}`,borderRadius:999,fontSize:14,fontWeight:600,cursor:"pointer"}}>{"←"} Edit inputs</button>
  </div>;

  /* ── CALCULATING PAGE ──────────────────────────────────── */

  const calcSteps = [
    {label:"Analysing your legacy estate"},
    {label:"Modelling decommission savings"},
    {label:"Estimating clinician time impact"},
  ];

  const calculatingPage = <div ref={calcPageRef} style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"55vh"}}>
    <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{width:44,height:44,margin:"0 auto 20px",border:`3px solid ${C.borderLight}`,borderTopColor:C.accent,borderRadius:"50%",animation:"calc-spin .8s linear infinite"}}/>
      <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:4}}>Calculating your ROI</h2>
      <p style={{fontSize:14,color:C.textMuted,marginBottom:28}}>Building a bespoke model from your inputs...</p>
      <div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:12}}>
        {calcSteps.map((s,i)=>{
          const done = calcStep > i, active = calcStep === i;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:12,opacity:done?1:active?0.8:0.2,transition:"opacity .4s",animation:active?"calc-fade .35s ease":"none"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:done?C.green:active?C.accent:C.borderLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {done?<span style={{color:"#fff",fontWeight:800,fontSize:12}}>{"✓"}</span>:<span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{i+1}</span>}
            </div>
            <span style={{fontSize:14,fontWeight:done||active?600:400,color:done?C.green:active?C.text:C.textMuted}}>{s.label}</span>
          </div>;
        })}
      </div>
      <div style={{marginTop:24,height:3,background:C.borderLight,borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${C.accent},${C.green})`,borderRadius:2,width:`${Math.min(calcStep/3*100,100)}%`,transition:"width .5s ease-out"}}/>
      </div>
    </div>
  </div>;

  /* ── SHELL ─────────────────────────────────────────────── */

  const fontHead = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";
  const fontBody = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";

  return <div style={{fontFamily:fontBody,background:C.bg,minHeight:"100vh",color:C.text,lineHeight:1.55,fontWeight:400,border:"1px solid #f7faf9",borderRadius:20,overflow:"hidden"}}>
    <div style={{background:C.teal,marginBottom:20}}>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px"}}><div style={{display:"flex",gap:0}}>
      {[
        { k: "inputs", l: "Your programme", n: "1" },
        { k: "results", l: "ROI estimate", n: "2" },
      ].map(p => {
        const isCurrent = page === p.k || (page === "calculating" && p.k === "results");
        return (
          <button type="button" key={p.k} className="roi-tab"
            onClick={() => page !== "calculating" && setPage(p.k)}
            style={{
              flex: 1, padding: "16px 8px", border: "none",
              borderBottom: isCurrent ? "3px solid #fff" : "3px solid transparent",
              background: "transparent",
              cursor: page === "calculating" ? "default" : "pointer",
              fontFamily: fontBody, fontSize: 14, fontWeight: isCurrent ? 700 : 500,
              color: isCurrent ? "#fff" : "rgba(255,255,255,0.5)",
            }}>
            <span style={{
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              width: 22, height: 22, borderRadius: "50%",
              background: isCurrent ? "#fff" : "rgba(255,255,255,0.2)", color: isCurrent ? C.teal : "rgba(255,255,255,0.7)",
              fontSize: 11, fontWeight: 700, marginRight: 6,
            }}>{p.n}</span>
            {p.l}
          </button>
        );
      })}
    </div></div></div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px 80px"}}>{page==="inputs"?inputPage:page==="calculating"?calculatingPage:resultsPage}</div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<ROICalculator />);
  </script>

  <script>
    // Iframe auto-resize: posts height to parent window
    (function() {
      if (window.self === window.top) return; // not in iframe, skip
      var last = 0;
      function postHeight() {
        var h = document.documentElement.scrollHeight;
        if (h !== last) { last = h; window.parent.postMessage({ type: "roi-calculator-resize", height: h }, "*"); }
      }
      if (window.ResizeObserver) {
        new ResizeObserver(postHeight).observe(document.documentElement);
      } else {
        setInterval(postHeight, 500);
      }
      postHeight();
    })();
  </script>
