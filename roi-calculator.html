/* ═══════════════════════════════════════════════════════════════
   ROI Calculator — Animations & Interactions
   ═══════════════════════════════════════════════════════════════ */

/* ── Keyframe animations ── */
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 2px 12px rgba(15,65,70,.3); }
  50% { box-shadow: 0 2px 24px rgba(15,65,70,.55); }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes think-fill {
  0% { width: 0%; }
  15% { width: 20%; }
  40% { width: 45%; }
  65% { width: 70%; }
  85% { width: 88%; }
  100% { width: 100%; }
}
@keyframes think-pulse {
  0%, 100% { opacity: .4; }
  50% { opacity: 1; }
}
@keyframes calc-fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes calc-spin {
  to { transform: rotate(360deg); }
}

/* ── Card hover ── */
.roi-card {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
}
.roi-card:hover {
  border-color: rgba(15,65,70,.25) !important;
  box-shadow: 0 2px 12px rgba(15,65,70,.08);
}

/* ── Generic button hover ── */
.roi-btn {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-btn:hover {
  border-color: rgba(15,65,70,.35) !important;
  box-shadow: 0 2px 16px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-btn:active {
  transform: translateY(0);
  box-shadow: 0 1px 4px rgba(15,65,70,.12);
}

/* ── Toggle pill (overrides roi-btn lift for flush buttons) ── */
.roi-toggle-pill .roi-btn {
  transform: none !important;
  box-shadow: none !important;
  border-color: transparent !important;
}
.roi-toggle-pill .roi-btn:hover {
  transform: none !important;
  box-shadow: none !important;
  opacity: .85;
}

/* ── Preset buttons ── */
.roi-preset {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-preset:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-preset:active {
  transform: translateY(0);
}

/* ── Tier cards ── */
.roi-tier {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-tier:hover {
  box-shadow: 0 2px 14px rgba(15,65,70,.08);
  border-color: rgba(15,65,70,.2) !important;
}

/* ── Text links ── */
.roi-link {
  transition: color .15s ease, opacity .15s ease;
}
.roi-link:hover {
  opacity: .7;
}

/* ── Clickable cost display ── */
.roi-cost {
  transition: border-color .2s ease, color .15s ease;
}
.roi-cost:hover {
  border-bottom-color: rgba(15,65,70,.5) !important;
}

/* ── Result cards ── */
.roi-result {
  transition: box-shadow .2s ease, transform .15s ease, border-color .2s ease;
}
.roi-result:hover {
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-2px);
  border-color: rgba(15,65,70,.15) !important;
}

/* ── Scenario chooser ── */
.roi-scenario {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-scenario:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 2px 14px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-scenario:active {
  transform: translateY(0);
}

/* ── Flagship rows ── */
.roi-flag {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-flag:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 2px 10px rgba(15,65,70,.06);
}

/* ── Tab buttons ── */
.roi-tab {
  transition: background .15s ease, color .15s ease;
}
.roi-tab:hover {
  background: rgba(15,65,70,.04) !important;
}

/* ── Slider hover ── */
.roi-slider {
  transition: opacity .15s ease;
}
.roi-slider:hover input[type="range"] {
  filter: brightness(.95);
}
.roi-slider input[type="range"] {
  transition: filter .15s ease;
}

/* ── Per-org rows ── */
.roi-org {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-org:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 1px 8px rgba(15,65,70,.06);
}

/* ── CTA button ── */
.roi-cta {
  transition: box-shadow .2s ease, transform .15s ease;
}
.roi-cta:hover {
  box-shadow: 0 4px 24px rgba(15,65,70,.2) !important;
  transform: translateY(-1px);
}
.roi-cta:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(15,65,70,.15) !important;
}

/* ═══════════════════════════════════════════════════════════════
   Mobile & Touch
   ═══════════════════════════════════════════════════════════════ */

/* On touch devices, disable hover transforms to prevent sticky states */
@media (hover: none) {
  .roi-btn:hover,
  .roi-preset:hover,
  .roi-result:hover,
  .roi-scenario:hover {
    transform: none !important;
  }

  /* Use :active for tactile feedback instead */
  .roi-btn:active,
  .roi-preset:active,
  .roi-scenario:active {
    background: rgba(15,65,70,.06) !important;
  }

  .roi-result:active {
    box-shadow: 0 2px 10px rgba(15,65,70,.1) !important;
  }

  .roi-tier:active {
    border-color: rgba(15,65,70,.25) !important;
  }
}

/* Narrow screens */
@media (max-width: 480px) {
  /* Year-by-year chart - tighten on mobile */
  .roi-chart-bars {
    gap: 4px !important;
    padding: 0 4px !important;
  }
  .roi-chart-bar-label {
    font-size: 10px !important;
  }
  /* Allow chart cards to use full available width */
  .roi-chart-bar {
    max-width: none !important;
  }

  /* Ensure range inputs are fat enough to thumb-drag */
  input[type="range"] {
    height: 32px;
    min-height: 32px;
  }

  /* Stack flagship rows vertically */
  .roi-flag {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }

  /* Toggle pill: ensure text doesn't clip */
  .roi-toggle-pill .roi-btn {
    padding: 10px 12px !important;
    font-size: 12px !important;
  }
}


/* Email form placeholder */
.roi-lead-input::placeholder {
  color: rgba(255, 255, 255, 0.5) !important;
  opacity: 1;
}
.roi-lead-input::-webkit-input-placeholder { color: rgba(255, 255, 255, 0.5) !important; }
.roi-lead-input::-moz-placeholder { color: rgba(255, 255, 255, 0.5) !important; }

  <script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

/* ═══════════════════════════════════════════════════════════════════════
   HOOKS
   ═══════════════════════════════════════════════════════════════════════ */

function useCountUp(target, duration = 1200, active = true) {
  const [display, setDisplay] = useState(0);
  const ref = useRef({ from: 0, to: 0, startTime: 0, raf: null, hasRun: false });
  useEffect(() => {
    if (!active) { setDisplay(0); ref.current.hasRun = false; return; }
    const r = ref.current;
    const from = r.hasRun ? display : 0;
    const dur = r.hasRun ? 600 : duration;
    r.from = from; r.to = target; r.startTime = performance.now(); r.hasRun = true;
    if (r.raf) cancelAnimationFrame(r.raf);
    const tick = (now) => {
      const p = Math.min((now - r.startTime) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(r.from + (r.to - r.from) * eased);
      if (p < 1) r.raf = requestAnimationFrame(tick);
    };
    r.raf = requestAnimationFrame(tick);
    return () => { if (r.raf) cancelAnimationFrame(r.raf); };
  }, [target, active]);
  return Math.round(display);
}
function AnimatedNum({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v.toLocaleString("en-US")}</span>; }
function AnimatedK({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v >= 1e6 ? `$${(v/1e6).toFixed(1)}m` : v >= 1000 ? `$${Math.round(v/1000).toLocaleString("en-US")}k` : `$${v.toLocaleString("en-US")}`}</span>; }

/* ═══════════════════════════════════════════════════════════════════════
   CALC ENGINE - tiered systems, bed-scaled costs, no parallel-run
   ═══════════════════════════════════════════════════════════════════════ */

const SCENARIO = {
  CONSERVATIVE: { decom_pct: 0.85, realization: 0.20, safety: 0.15 },
  EXPECTED:     { decom_pct: 1.00, realization: 0.30, safety: 0.25 },
  STRETCH:      { decom_pct: 1.10, realization: 0.40, safety: 0.35 },
};
const CX = { LOW: 0.7, TYPICAL: 1.0, HIGH: 1.45 };
const DQ = { CLEAN: 0.75, MIXED: 1.0, POOR: 1.4 };

function tierCost(tier, beds, cx) {
  const base = tier === "enterprise" ? 300000 : tier === "departmental" ? 75000 : 14000;
  const perBed = tier === "enterprise" ? 700 : tier === "departmental" ? 160 : 20;
  return Math.round(((base + beds * perBed) * cx) / 1000) * 1000;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function calc(inp, mode, ov = {}, flagships = []) {
  const sc = SCENARIO[mode], cx = CX[inp.complexity_level], dq = DQ[inp.data_quality_level];
  const isArchiveOnly = inp.journey === "HAVE_EPR";
  const ent = ov.enterprise != null ? ov.enterprise : inp.tiers.enterprise;
  const dep = ov.departmental != null ? ov.departmental : inp.tiers.departmental;
  const nic = ov.niche != null ? ov.niche : inp.tiers.niche;
  const tieredLegacy = ent + dep + nic;
  const entCost = ov.entCost != null ? ov.entCost : tierCost("enterprise", inp.bed_count, cx);
  const depCost = ov.depCost != null ? ov.depCost : tierCost("departmental", inp.bed_count, cx);
  const nicCost = ov.nicCost != null ? ov.nicCost : tierCost("niche", inp.bed_count, cx);
  const tieredEstate = ent * entCost + dep * depCost + nic * nicCost;
  // Flagships
  const flagshipTotal = flagships.reduce((s,f) => s + (f.cost || 0), 0);
  const flagshipDecomSave = flagships.filter(f => f.retire).reduce((s,f) => s + (f.cost || 0), 0);
  const flagshipCount = flagships.length;
  const flagshipRetireCount = flagships.filter(f => f.retire).length;
  const portfolioSystems = inp._portfolioSystems || 0;
  const legacy = tieredLegacy + flagshipCount + portfolioSystems;
  const totalEstate = tieredEstate + flagshipTotal + (inp._portfolioCost || 0);
  const blendedCost = legacy > 0 ? Math.round(totalEstate / legacy) : 0;
  const rawDecom = tieredLegacy * inp.decom_retire_rate * sc.decom_pct;
  const decom = Math.min(Math.round(rawDecom), tieredLegacy) + flagshipRetireCount;
  const decomFrac = tieredLegacy > 0 ? Math.min(Math.round(rawDecom), tieredLegacy) / tieredLegacy : 0;
  const entDecom = Math.min(Math.round(ent * decomFrac), ent);
  const depDecom = Math.min(Math.round(dep * decomFrac), dep);
  const nicDecom = clamp(Math.min(Math.round(rawDecom), tieredLegacy) - entDecom - depDecom, 0, nic);
  const decomSave = entDecom * entCost + depDecom * depCost + nicDecom * nicCost + Math.round(flagshipDecomSave * sc.decom_pct);
  const corpPerOrg = Math.min(120, Math.round(CORPORATE_STAFF_BASE + (inp.bed_count / Math.max(1, inp.org_count)) * CORPORATE_STAFF_PER_BED));
  const totalStaff = Math.round(inp.bed_count * STAFF_PER_BED + inp.org_count * corpPerOrg + (inp._portfolioStaff || 0));
  const clinicians = ov.clinicians != null ? ov.clinicians : Math.round(totalStaff * ACTIVE_USER_PCT);
  const systemsPerUser = Math.max(2, Math.round(legacy * SYSTEM_EXPOSURE_PCT));
  const switchPenalty = Math.max(0, systemsPerUser - 1) * SWITCH_PENALTY_PER_SYSTEM;
  const baseMin = isArchiveOnly ? 8 : 12; // Westbrook et al 2020: 5-12 mins/day on legacy lookups even with live EMR; 8 mins/week conservative
  const cappedPenalty = Math.min(switchPenalty, 4.0); // Cap: prevents >60 min/wk at extreme system counts
  const minsWasted = ov.minsWasted != null ? ov.minsWasted : Math.round(baseMin * dq * cx * (1 + cappedPenalty));
  const residual = isArchiveOnly ? 1 : 2;
  const hrsSaved = Math.round((clinicians * Math.max(0, minsWasted - residual) * WORKING_WEEKS) / 60);
  const timeSave = Math.round(hrsSaved * BLENDED_HOURLY_RATE * sc.realization);
  const ticketsBaselineMonthly = ov.ticketsBaseline != null ? ov.ticketsBaseline : Math.round(legacy * TICKETS_PER_SYSTEM * dq);
  const ticketsAfter = Math.min(Math.round((legacy - decom) * TICKETS_PER_SYSTEM * dq * SURVIVING_SYSTEM_TICKET_FACTOR), ticketsBaselineMonthly);
  const ticketsReductionPct = Math.round((ticketsBaselineMonthly - ticketsAfter) / Math.max(1, ticketsBaselineMonthly) * 100);
  const sarDaysBefore = ov.sarDaysBefore != null ? ov.sarDaysBefore : Math.round((SAR_BASE_DAYS + legacy * SAR_DAYS_PER_SYSTEM_BEFORE * dq) * 10) / 10;
  const sarDaysAfter = Math.min(Math.round((SAR_BASE_DAYS + (legacy - decom) * SAR_DAYS_PER_SYSTEM_AFTER) * 10) / 10, sarDaysBefore);
  const sarReductionPct = Math.round((sarDaysBefore - sarDaysAfter) / Math.max(1, sarDaysBefore) * 100);
  const hasClinicalScope = legacy >= 3 && inp.bed_count > 0;
  let safetyMedErrorsAvoided=0, safetyPatientsProtected=0, safetyBedDaysAvoided=0, safetyMedErrorsBaseline=0;
  if (hasClinicalScope) {
    const frag = 0.6 + Math.min(legacy, 20) / 20 * 0.6;
    safetyMedErrorsBaseline = Math.round(inp.bed_count * MED_ERRORS_PER_BED * frag * dq);
    const harmedBl = Math.round(inp.bed_count * PATIENTS_HARMED_PER_BED * frag * dq);
    const bedDaysBl = Math.round(inp.bed_count * EXCESS_BED_DAYS_PER_BED * frag * dq);
    safetyMedErrorsAvoided = Math.round(safetyMedErrorsBaseline * sc.safety);
    safetyPatientsProtected = Math.round(harmedBl * sc.safety);
    safetyBedDaysAvoided = Math.round(bedDaysBl * sc.safety);
  }
  // ── Reimbursement & Compliance Impact ──
  // Admissions and revenue (evidence-based derivation)
  const occupancy = inp._occupancy || DEFAULT_OCCUPANCY;
  const admissionsPerYear = Math.round(inp.bed_count * (365 / US_AVG_ALOS) * occupancy);
  const estAnnualRevenueCalc = admissionsPerYear * US_AVG_REVENUE_PER_ADMISSION;
  // Medicare DRG revenue estimate (if not provided by user)
  const estMedicareDrgRevenue = Math.round(estAnnualRevenueCalc * (inp._medicarePct || 0.42));
  const medicareDrg = inp._medicareDrgRevenue > 0 ? inp._medicareDrgRevenue : estMedicareDrgRevenue;

  // HRRP penalty exposure
  const hrrpExposure = medicareDrg * CMS_HRRP_AVG_PENALTY;
  const hrrpReduction = Math.round(hrrpExposure * sc.safety * (inp._penaltyWeight != null ? inp._penaltyWeight : 1.0));

  // HAC penalty exposure (bottom quartile = 1% of all Medicare payments)
  const hacExposure = medicareDrg * CMS_HAC_PENALTY * 0.25; // 25% probability of being in bottom quartile
  const hacReduction = Math.round(hacExposure * sc.safety * (inp._penaltyWeight != null ? inp._penaltyWeight : 1.0));

  // VBP improvement potential
  const vbpPool = medicareDrg * CMS_VBP_WITHHOLD;
  const vbpImprovement = Math.round(vbpPool * 0.15 * sc.safety * (inp._qualityBonus != null ? inp._qualityBonus : 0.5));

  // Denial rate reduction (FFS pathway)
  const estAnnualRevenue = estAnnualRevenueCalc; // from admissions-based model above
  const denialBaseline = estAnnualRevenue * DENIAL_NET_REVENUE_LOSS;
  const denialRecovery = Math.round(denialBaseline * DENIAL_FRAGMENTATION_ATTRIBUTION * 0.20 * sc.decom_pct * (inp._denialWeight || 1.0));

  // Malpractice premium reduction (modeled assumption)
  const malpracticePremium = inp.bed_count * MALPRACTICE_AVG_PREMIUM_PER_BED;
  const malpracticeReduction = Math.round(malpracticePremium * 0.05 * sc.safety); // 5% reduction — conservative (CRICO: 30% of claims involve comms failure)

  // Excess bed days avoided (unified with safety section)
  const preventableADEs = Math.round(admissionsPerYear / 100 * PREVENTABLE_ADE_PER_100_ADMITS);
  // Use safety section's bed day estimate when available for consistency
  const excessDaysAvoided = hasClinicalScope ? safetyBedDaysAvoided : Math.round(preventableADEs * EXCESS_DAYS_PER_ADE * sc.safety);
  const excessDayCostAvoided = Math.round(excessDaysAvoided * COST_PER_EXCESS_BED_DAY);

  // Duplicate testing reduction
  const estLabSpend = inp.bed_count * 8500; // ~$8,500 per bed in lab/imaging spend
  const duplicateWaste = estLabSpend * DUPLICATE_TEST_RATE;
  const duplicateReduction = Math.round(duplicateWaste * 0.50 * sc.decom_pct); // 50% of duplicates addressable

  // ── Academic Medical Center Module ──
  const isAcademic = inp._providerType === "academic";
  const researchSystems = isAcademic ? Math.round(inp.bed_count / 100 * RESEARCH_SYSTEMS_PER_100_BEDS) : 0;
  const researchSystemCost = researchSystems * RESEARCH_SYSTEM_AVG_COST;
  const researchDecomSave = Math.round(researchSystemCost * 0.60 * sc.decom_pct); // 60% retirable
  const gmeComplianceCost = isAcademic ? Math.round(inp.bed_count * GME_COMPLIANCE_COST_PER_BED) : 0;
  const gmeEfficiency = Math.round(gmeComplianceCost * 0.25 * sc.decom_pct); // 25% efficiency gain
  const teachingOverhead = isAcademic ? Math.round(totalEstate * TEACHING_OVERHEAD_PCT * 0.30 * sc.decom_pct) : 0; // 30% of 12% extra complexity

  // ── M&A / Multi-Hospital Module ──
  const isMultiHospital = inp._providerType === "multi_hospital";
  const duplicateSystems = isMultiHospital ? Math.round(legacy * DUPLICATE_SYSTEM_RATE) : 0;
  const duplicateSystemCost = isMultiHospital ? Math.round(duplicateSystems * blendedCost) : 0;
  const duplicateElimination = Math.round(duplicateSystemCost * sc.decom_pct);
  const duplicateInfraCost = isMultiHospital ? inp.org_count * DUPLICATE_INFRA_COST_PER_FACILITY : 0;
  const infraConsolidation = Math.round(duplicateInfraCost * 0.60 * sc.decom_pct); // 60% consolidatable
  const standardizationSave = isMultiHospital ? Math.round(totalEstate * CROSS_FACILITY_STANDARDIZATION_PCT * sc.decom_pct) : 0;

  // Module totals
  const academicSavings = researchDecomSave + gmeEfficiency + teachingOverhead;
  const mergeSavings = duplicateElimination + infraConsolidation + standardizationSave;

  // Total reimbursement impact
  const reimbursementImpact = hrrpReduction + hacReduction + vbpImprovement + denialRecovery;
  // Readmission cost avoidance (VBC/mixed models)
  const isVBC = inp._reimbursementModel === "vbc" || inp._reimbursementModel === "mixed";
  const usReadmissionRate = 0.156; // CMS 15.6% 30-day all-cause
  const usReadmitReduction = 0.008; // Vest et al JAMIA 2019: 0.8pp
  const usReadmitAttribution = 0.30;
  const usReadmitCostPer = 16000; // CMS avg readmission cost
  const usReadmissionsAvoided = isVBC ? Math.round(admissionsPerYear * usReadmitReduction * usReadmitAttribution * sc.safety) : 0;
  const usReadmissionCostAvoidance = usReadmissionsAvoided * usReadmitCostPer;

  const qualitySavings = malpracticeReduction + excessDayCostAvoided + duplicateReduction + usReadmissionCostAvoidance;

  const annual = decomSave + timeSave;
  const annualWithReimbursement = annual + reimbursementImpact + qualitySavings + academicSavings + mergeSavings;
  // Phased ramp: Year 1 = 40%, Year 2 = 80%, Year 3 = 100% of steady-state
  const rampYears = inp._rampYears || 3;
  const rampPcts = rampYears === 5 ? [0.20,0.40,0.60,0.80,1.00] : [0.40,0.80,1.00];
  const y1Pct = rampPcts[0], y2Pct = rampPcts[1], y3Pct = rampPcts[2];
  const yr1 = Math.round(annual * y1Pct);
  const yr2 = Math.round(annual * y2Pct);
  const yr3 = Math.round(annual * y3Pct);
  const total3 = yr1 + yr2 + yr3;
  const yr1R = Math.round(annualWithReimbursement * y1Pct);
  const yr2R = Math.round(annualWithReimbursement * y2Pct);
  const yr3R = Math.round(annualWithReimbursement * y3Pct);
  const yr4R = rampYears===5 ? Math.round(annualWithReimbursement*rampPcts[3]) : 0;
  const yr5R = rampYears===5 ? Math.round(annualWithReimbursement*rampPcts[4]) : 0;
  const total3WithReimbursement = rampPcts.reduce((s,p) => s + Math.round(annualWithReimbursement*p), 0);
  return {
    legacy, ent, dep, nic, entCost, depCost, nicCost, blendedCost, totalEstate,
    decom, entDecom, depDecom, nicDecom, decomSave,
    totalStaff, clinicians, systemsPerUser, minsWasted, hrsSaved, timeSave, baseMin,
    ticketsBaselineMonthly, ticketsAfter, ticketsReductionPct,
    sarDaysBefore, sarDaysAfter, sarReductionPct,
    hasClinicalScope, safetyMedErrorsAvoided, safetyPatientsProtected,
    safetyBedDaysAvoided, safetyMedErrorsBaseline,
    annual, total3, yr1, yr2, yr3, y1Pct, y2Pct, y3Pct, yr4R, yr5R, rampYears, rampPcts, realization: sc.realization, decomFactor: sc.decom_pct, safetyFactor: sc.safety, isArchiveOnly,
    fteEquivalent: Math.round(hrsSaved * sc.realization / 2080 * 10) / 10,
    flagshipTotal, flagshipDecomSave: Math.round(flagshipDecomSave * sc.decom_pct),
    flagshipCount, flagshipRetireCount,
    // Reimbursement & compliance
    admissionsPerYear, estAnnualRevenueCalc, occupancy, medicareDrg, hrrpExposure, hrrpReduction, hacExposure, hacReduction,
    vbpPool, vbpImprovement, denialBaseline, denialRecovery,
    malpracticePremium, malpracticeReduction,
    preventableADEs, excessDaysAvoided, excessDayCostAvoided,
    duplicateWaste, duplicateReduction,
    reimbursementImpact, qualitySavings, usReadmissionsAvoided, usReadmissionCostAvoidance, isVBC,
    // Academic module
    isAcademic, researchSystems, researchSystemCost, researchDecomSave,
    gmeComplianceCost, gmeEfficiency, teachingOverhead, academicSavings,
    // M&A module
    isMultiHospital, duplicateSystems, duplicateSystemCost, duplicateElimination,
    duplicateInfraCost, infraConsolidation, standardizationSave, mergeSavings,
    annualWithReimbursement, total3WithReimbursement, yr1R, yr2R, yr3R,
  };
}

function AnimatedSlider({ value, min, max, step, onChange, label, suffix, display, hideRange }) {
  const [av, setAv] = useState(value);
  const [drag, setDrag] = useState(false);
  const trackRef = useRef(null), animRef = useRef(null);
  useEffect(() => { if (drag) return; if (animRef.current) cancelAnimationFrame(animRef.current); const from=av,to=value; if(from===to)return; const start=performance.now(); const tick=now=>{const p=Math.min((now-start)/350,1);setAv(Math.round((from+(to-from)*(1-Math.pow(1-p,3)))/step)*step);if(p<1)animRef.current=requestAnimationFrame(tick);}; animRef.current=requestAnimationFrame(tick); }, [value]);
  const pct=((av-min)/(max-min))*100;
  return <div className="roi-slider" style={{flex:"1 1 200px",minWidth:180}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
      <label style={{fontSize:13,fontWeight:600,color:C.textMid}}>{label}</label>
      <span style={{fontSize:20,fontWeight:800,color:C.accent}}>{display!=null?display:av}{suffix||""}</span>
    </div>
    <div ref={trackRef} style={{position:"relative",height:24,cursor:"pointer",display:"flex",alignItems:"center"}}>
      <div style={{position:"absolute",left:0,right:0,height:6,borderRadius:3,background:"#e0e4ea"}}/>
      <div style={{position:"absolute",left:0,width:`${pct}%`,height:6,borderRadius:3,background:C.accent,transition:drag?"none":"width .3s"}}/>
      <div style={{position:"absolute",left:`${pct}%`,width:18,height:18,borderRadius:"50%",background:"#fff",border:`3px solid ${C.accent}`,transform:"translateX(-50%)",boxShadow:"0 1px 4px rgba(0,0,0,.15)",transition:drag?"none":"left .3s",zIndex:1}}/>
      <input type="range" min={min} max={max} step={step} value={av}
        onInput={e=>{setDrag(true);const v=+e.target.value;setAv(v);onChange(v);}}
        onMouseDown={()=>setDrag(true)} onMouseUp={()=>setDrag(false)}
        onTouchStart={()=>setDrag(true)} onTouchEnd={()=>setDrag(false)}
        style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2,margin:0}}/>
    </div>
    {!hideRange&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted,marginTop:2}}><span>{min}{suffix||""}</span><span>{max}{suffix||""}</span></div>}
  </div>;
}

    const a = document.createElement("a"); a.href = url; a.download = pdf.filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);

    // 3. Submit to HubSpot (EU1 region, fire-and-forget)
    if (HUBSPOT_PORTAL_ID && HUBSPOT_FORM_GUID) {
      try {
        const scenarioLabel = am==="CONSERVATIVE"?"Conservative":am==="STRETCH"?"Stretch":"Expected";
        const calcContext = `ROI Calculator submission | Scenario: ${scenarioLabel} | Beds: ${inputs.bed_count} | Orgs: ${inputs.org_count} | Legacy systems: ${r.legacy} | Annual savings: ${fmtK(r.annual)} | 3-year total: ${fmtK(r.total3)} | Complexity: ${inputs.complexity_level} | Journey: ${isArchiveOnly?"Archive only":"Migration + archiving"}`;
        await fetch(`https://forms-${HUBSPOT_REGION}.hsforms.com/submissions/v3/integration/submit/${HUBSPOT_PORTAL_ID}/${HUBSPOT_FORM_GUID}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            fields: [
              { name: "firstname", value: leadForm.name.split(" ")[0] },
              { name: "lastname", value: leadForm.name.split(" ").slice(1).join(" ") || "" },
              { name: "email", value: leadForm.email },
              { name: "company", value: leadForm.org || "" },
              { name: "jobtitle", value: leadForm.role || "" },
              { name: "message", value: calcContext },
            ],
            context: {
              pageUri: window.location.href,
              pageName: "ROI Calculator",
            },
            legalConsentOptions: {
              consent: {
                consentToProcess: true,
                text: "I agree to receive communications about my ROI estimate.",
              },
            },
          }),
        });
      } catch (e) { console.warn("HubSpot submission failed:", e); }
    }

    // 4. Send PDF via email endpoint (fire-and-forget)
    if (EMAIL_ENDPOINT) {
      try {
        const reader = new FileReader();
        reader.onload = async () => {
          const base64 = reader.result.split(",")[1];

            await fetch(EMAIL_ENDPOINT, {

                total3: r.total3,

            });
          } catch (e) { console.warn("Email endpoint failed:", e); }
        };
        reader.readAsDataURL(pdf.blob);
      } catch (e) { console.warn("PDF encoding failed:", e); }
    }

    {/* Sensitivity analysis */}

      const halfDecom = Math.round(r.decomSave * 0.5 + r.timeSave + r.reimbursementImpact + r.qualitySavings + r.academicSavings + r.mergeSavings);

      const halfBothPct = Math.round(halfBoth / Math.max(1, baseAnnual) * 100);

        }} className="roi-cta">{leadSending ? "Generating report..." : (pdfFormat==="board"?"Download board summary":"Download PDF report")}</button>
        <p style={{fontSize:11,opacity:.4,marginTop:12}}>{EMAIL_ENDPOINT ? "Your report will also be emailed to you. " : ""}We may reach out to see if we can help with your program.</p>
      </Card>

        </div>

    {/* ── Full Methodology ── */}
    {!dim && (() => {
      const S = ({title, children, defaultOpen}) => {
        const [open, setOpen] = useState(defaultOpen || false);
        return <div style={{borderBottom:`1px solid ${C.borderLight}`}}>
          <button type="button" onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"13px 0",background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,color:C.text,textAlign:"left"}}>
            <span>{title}</span>
            <span style={{fontSize:16,color:C.textMuted,transform:open?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0,marginLeft:8}}>{"\u25be"}</span>
          </button>
          {open && <div style={{paddingBottom:16,fontSize:13,lineHeight:1.7,color:C.textMid}}>{children}</div>}
        </div>;
      };
      const Tag = ({label, color, source}) => {
        const [hover, setHover] = useState(false);
        return <span style={{position:"relative",display:"inline-block",marginLeft:6,verticalAlign:"middle"}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
          <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:color||C.accentPale,color:color?"#fff":C.accent,cursor:source?"help":"default"}}>{label}</span>
          {hover && source && <span style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",fontSize:11,lineHeight:1.5,padding:"8px 12px",borderRadius:6,width:260,maxWidth:"80vw",boxShadow:"0 4px 16px rgba(0,0,0,.22)",zIndex:20,pointerEvents:"none",fontWeight:400,whiteSpace:"normal"}}>{source}</span>}
        </span>;
      };
      const Ev = ({s}) => <Tag label="Evidence-based" color={C.green} source={s}/>;
      const Bm = ({s}) => <Tag label="Industry benchmark" color="#1a7a7a" source={s}/>;
      const Bn = ({s}) => <Tag label="Benchmarked" color="#8a6d2b" source={s}/>;
      const Md = ({s}) => <Tag label="Modeled estimate" color={C.textMuted} source={s}/>;
      const F = ({children}) => <div style={{padding:"12px 16px",background:C.bg,borderRadius:8,margin:"10px 0",fontFamily:"'FK Grotesk Neue','FK Grotesk',monospace",fontSize:12,color:C.text,lineHeight:1.6}}>{children}</div>;

      return <Card style={{marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <SIcon name="book" size={22} color={C.accent}/>
          <h3 style={{fontSize:17,fontWeight:800,margin:0,color:C.text}}>How we calculated this</h3>
        </div>
        <p style={{fontSize:13,color:C.textMuted,margin:"4px 0 12px"}}>Full methodology, formulae and evidence base. Every figure marked {"\u270e"} in the calculator is overridable.</p>

        <S title="1. Scenario multipliers" defaultOpen={true}>
          <p style={{margin:"0 0 8px"}}>Three scenarios scale all outputs to reflect confidence levels.</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Parameter</th><th style={{padding:"6px 10px"}}>Conservative</th><th style={{padding:"6px 10px"}}>Expected</th><th style={{padding:"6px 10px"}}>Stretch</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Decommission scaling</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.85x</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00x</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.10x</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Time realization rate</td><td style={{padding:"6px 10px",textAlign:"center"}}>20%</td><td style={{padding:"6px 10px",textAlign:"center"}}>30%</td><td style={{padding:"6px 10px",textAlign:"center"}}>40%</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Safety reduction</td><td style={{padding:"6px 10px",textAlign:"center"}}>15%</td><td style={{padding:"6px 10px",textAlign:"center"}}>25%</td><td style={{padding:"6px 10px",textAlign:"center"}}>35%</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Decom scaling</strong> adjusts how many of your planned retirements actually happen {" - "} Conservative assumes 85% (program delays, contractual holdups), Stretch assumes 10% overachievement. <Md s="No published benchmark. User sets their own target and this scales it."/></p>
          <p style={{margin:"4px 0"}}><strong>Time realization</strong> {" - "} the fraction of freed clinician time that translates into measurable capacity. IHI productive ward reported 20-40%. <Bm s="IHI productive ward program; IHI operational efficiency framework."/></p>
          <p style={{margin:"4px 0"}}><strong>Safety reduction</strong> {" - "} avoidable medication errors from system consolidation. AHRQ Patient Safety Indicators; Joint Commission Sentinel Event data, Gate et al 2023 found 25-50% reductions. <Ev s="AHRQ Patient Safety Indicators; Joint Commission Sentinel Event data; Gate et al 2023."/></p>
        </S>

        <S title="2. System cost estimation">
          <p style={{margin:"0 0 8px"}}>Each legacy system is classified into one of three tiers. Annual cost scales with bed count and complexity.</p>
          <F>tierCost = round((base + beds {"\u00d7"} perBed) {"\u00d7"} complexity / 1000) {"\u00d7"} 1000</F>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Tier</th><th style={{padding:"6px 10px"}}>Base</th><th style={{padding:"6px 10px"}}>Per bed</th><th style={{padding:"6px 10px"}}>800 beds (Typical)</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Enterprise</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}300k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}700/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"$"}860k/yr</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Departmental</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}75k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}160/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"$"}203k/yr</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Standalone</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}14k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"$"}20/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"$"}30k/yr</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>These formulas were calibrated against real contract data from a large acute health system (~1,385 beds, 42 legacy systems). Default estimates cover ~80% of actual estate value. <Bn s="Validated against contract register from a large acute health system (~1,385 beds, 42 systems, 2024/25 data)."/></p>
          <p style={{margin:"4px 0"}}>The complexity multiplier adjusts costs: Low 0.70, Typical 1.00, High 1.45. <Md s="Calibrated to produce approximately +/-30% variation. Benchmarked Trust classified as HIGH (1.45)."/></p>
          <p style={{margin:"4px 0"}}>For trusts with known contract values, click any tier cost to override it, add named flagship systems with actual costs, or use {"\u201c"}I know my spend{"\u201d"} mode to enter your total directly.</p>
        </S>

        <S title="3. Decommission savings">
          <p style={{margin:"0 0 8px"}}>The primary financial benefit: retiring legacy systems eliminates their annual running costs.</p>
          <F>1. Set decom target (default 75%)<br/>2. rawDecom = totalSystems {"\u00d7"} decomTarget {"\u00d7"} scenarioMultiplier<br/>3. Systems retired pro-rata across tiers<br/>4. decomSave = (entRetired {"\u00d7"} entCost) + (depRetired {"\u00d7"} depCost) + (nicRetired {"\u00d7"} nicCost) + flagshipSave</F>
          <p style={{margin:"8px 0 4px"}}><strong>75% default decom target</strong> {" - "} most EHR migration programs plan to retire 60-80% of legacy systems. Some are retained for long-retention data or functions not covered by the new EHR. Validated against real health system data where ~32 of 42 systems were candidates for retirement. <Bm s="EHR program consensus; validated against benchmarked health system application footprint."/></p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems</strong> flagged as {"\u201c"}Retire{"\u201d"} are decommissioned at their full stated contract value, scaled by the scenario multiplier.</p>
        </S>

        <S title="4. Clinician time savings">
          <p style={{margin:"0 0 8px"}}>Time freed when clinicians no longer switch between multiple legacy systems.</p>
          <F>corpPerOrg = min(120, 20 + bedsPerFacility {"\u00d7"} 0.15)<br/>clinicians = beds {"\u00d7"} 3.2 + facilities {"\u00d7"} corpPerOrg<br/>switchPenalty = min(max(0, systems - 1) {"\u00d7"} 0.04, 4.0)<br/>minsWasted = baseMin {"\u00d7"} DQ {"\u00d7"} CX {"\u00d7"} (1 + switchPenalty)<br/>hrsSaved = clinicians {"\u00d7"} (minsWasted - residual) {"\u00d7"} 50wks / 60<br/>timeSave = hrsSaved {"\u00d7"} {"$"}95/hr {"\u00d7"} realizationRate</F>
          <p style={{margin:"8px 0 4px"}}><strong>3.2 staff per bed</strong> {" - "} BLS Occupational Employment and Wage Statistics show 2.8-3.5 clinical full-time equivalents (FTEs) per acute bed (doctors, nurses, allied health professionals (AHPs), pharmacists). <Ev s="BLS OEWS 2023; MGMA staffing benchmarks."/></p>
          <p style={{margin:"4px 0"}}><strong>12 min/wk base</strong> (migration path) {" - "} Westbrook et al 2010 (JAMIA) found nurses interrupted 3-6 times/hour by system-switching. Nuffield Trust 2020 estimated 15-20 min/day lost to system navigation. Our 12 min/week is conservative (reducible portion only). Archive-only uses 5 min/wk. <Ev s="Westbrook et al 2010 (JAMIA); Nuffield Trust 2020 system navigation study."/></p>
          <p style={{margin:"4px 0"}}><strong>+4% per system</strong> {" - "} each additional legacy system adds cognitive overhead. At 42 systems (as in the benchmarked Trust), this produces ~10 min/day wasted, consistent with published studies. <Md s="First-principles switching cost model. Validated against benchmarked Trust (42 systems)."/></p>
          <p style={{margin:"4px 0"}}><strong>{"$"}95/hr blended rate</strong> {" - "} BLS median hourly compensation for clinical staff including benefits (OEWS 2023). RN ~$45-55/hr, physicians ~$120-180/hr, AHPs ~$35-65/hr. Blended $95/hr weighted toward nursing as the largest user group. <Ev s="BLS OEWS 2023; MGMA physician compensation report 2024."/></p>
        </S>

        <S title="5. Support tickets & patient records request (SAR) turnaround">
          <p style={{margin:"0 0 8px"}}><strong>Tickets:</strong> 2.5 per system/month baseline (IT Infrastructure Library / ITIL service desk metrics). Surviving systems generate 40% fewer tickets due to consolidated support. <Bm s="ITIL service desk reporting in US health systems; 0.6 factor is a modeled estimate."/></p>
          <p style={{margin:"4px 0"}}><strong>Patient records request turnaround:</strong> 1.5 day base + 0.4 days per system (before), 0.15 days per surviving system (after). The HIPAA Privacy Rule requires searching all systems where patient data may be held. At 42 systems, this produces ~18 working days per SAR {" - "} consistent with reports from health systems with fragmented EHR estates. <Md s="Consistent with HIM department reports. Validated against benchmarked health system data."/></p>
        </S>

        <S title="6. Patient safety metrics">
          <p style={{margin:"0 0 8px"}}>These are <strong>not included</strong> in the financial ROI total. They provide qualitative context for the patient safety case.</p>
          <F>medErrors = beds {"\u00d7"} 15 {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>patientsHarmed = beds {"\u00d7"} 0.28 {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>excessBedDays = beds {"\u00d7"} 0.32 {"\u00d7"} fragmentation {"\u00d7"} DQ</F>
          <p style={{margin:"8px 0 4px"}}><strong>15 medication errors per bed/yr</strong> {" - "} IOM estimates 6.5 medication errors per 100 admissions (Bates et al ADE Prevention Study). At ~42 admissions/bed/yr and 65% occupancy, this yields approximately 15 errors/bed. Bond et al documented the average US hospital experiences a medication error every 22.7 hours. <Ev s="Bates et al ADE Prevention Study; Bond et al 2001; AHRQ PSI v2024 benchmarks."/></p>
          <p style={{margin:"4px 0"}}><strong>0.28 patients harmed per bed/yr</strong> {" - "} HHS OIG (2022) found 25% of hospitalized Medicare patients experienced adverse events, with 12% experiencing serious harm and 43% of all harm events deemed preventable. <Ev s="HHS Office of Inspector General, Adverse Events in Hospitals, 2022."/></p>
          <p style={{margin:"4px 0"}}><strong>0.32 excess bed days per bed/yr</strong> {" - "} Bates/Classen studies show 1.74-3.15 excess days per ADE. Zhan & Miller (JAMA 2003) established 0-10.89 excess days per AHRQ PSI event type. At $3,132/day national average (KFF/AHA 2023). <Ev s="Bates et al 1997; Classen et al 2011; Zhan & Miller JAMA 2003; KFF/AHA 2023."/></p>
          <p style={{margin:"4px 0"}}><strong>Fragmentation index</strong> (0.6-1.2) scales risk by number of systems. Vest et al (JAMIA 2015) found 57% higher odds of same-cause readmission with fragmented records. Caps at 20 systems (diminishing marginal fragmentation). <Md s="No published fragmentation index exists. Informed by Vest et al JAMIA 2015 readmission odds."/></p>
          <p style={{margin:"4px 0"}}><strong>Malpractice context:</strong> CRICO Strategies analysis of 23,658 malpractice claims found communication failures in 30% of all claims, contributing to 1,744 patient deaths and $1.7bn in costs over 5 years. Mello et al (Health Affairs 2010) estimated total US malpractice system cost at $55.6bn. <Ev s="CRICO Strategies 2016; Mello et al Health Affairs 2010; AMA MLM 2024."/></p>
        </S>

        <S title="7. Evidence base and validation">
          <p style={{margin:"0 0 8px"}}>Key evidence sources underpinning the US model:</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Metric</th><th style={{padding:"6px 10px"}}>Value</th><th style={{padding:"6px 10px"}}>Source</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Readmission reduction (EHR)</td><td style={{padding:"6px 10px",textAlign:"center"}}>17% relative</td><td style={{padding:"6px 10px"}}>Pattar et al, JAMA 2025 (116 RCTs)</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Single-vendor EHR effect</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.8pp absolute</td><td style={{padding:"6px 10px"}}><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7792753/" target="_blank" rel="noopener" style={{color:"#0563C1",textDecoration:"underline"}}>Vest et al, JAMIA 2019</a></td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Patients harmed (Medicare)</td><td style={{padding:"6px 10px",textAlign:"center"}}>25% of admits</td><td style={{padding:"6px 10px"}}>HHS OIG 2022</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Comm. failure in claims</td><td style={{padding:"6px 10px",textAlign:"center"}}>30%</td><td style={{padding:"6px 10px"}}>CRICO 2016 (23,658 claims)</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Excess bed day cost</td><td style={{padding:"6px 10px",textAlign:"center"}}>$3,132/day</td><td style={{padding:"6px 10px"}}>KFF/AHA 2023</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Denial rate (initial)</td><td style={{padding:"6px 10px",textAlign:"center"}}>11.8%</td><td style={{padding:"6px 10px"}}>Kodiak Solutions 2024</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>HRRP avg penalty</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.33%</td><td style={{padding:"6px 10px"}}>CMS FY2025 program data</td></tr>
              <tr><td style={{padding:"6px 10px"}}>Duplicate test rate</td><td style={{padding:"6px 10px",textAlign:"center"}}>20-30%</td><td style={{padding:"6px 10px"}}>ONC / expert consensus</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>Full integration case study: NYU Langone Health achieved a 33% relative reduction in risk-adjusted mortality after fully integrating an acquired safety net hospital onto a unified Epic-based EHR with unified governance and quality analytics (Wang et al, JAMA Network Open 2022). <Ev s="Wang et al, JAMA Network Open 2022; NYU Langone integration study."/></p>
          <p style={{margin:"4px 0"}}>Cautionary counterexample: the VA Oracle Health implementation experienced 826 major performance incidents and confirmed harm to at least 149 veterans, underscoring that poorly executed migration creates worse outcomes than fragmented systems. <Ev s="VA OIG reports 2023-2024; Federal News Network."/></p>
          <p style={{margin:"4px 0"}}>Tier cost formulas are calibrated against KLAS 2025 market data, Becker{"'"}s Hospital Review pricing surveys, and EMR Guides contract analyses. Each named system uses a baseCost + perBed model that scales with hospital size.</p>
        </S>

        <S title="8. Reimbursement and compliance methodology">
          <p style={{margin:"0 0 8px"}}>CMS penalty avoidance and revenue cycle impact are modeled from verified program rates and provider-specific multipliers.</p>
          <F>hrrpReduction = medicareDrg {"\u00d7"} 0.33% {"\u00d7"} safetyFactor {"\u00d7"} penaltyWeight<br/>hacReduction = medicareDrg {"\u00d7"} 1% {"\u00d7"} 25% quartile {"\u00d7"} safetyFactor<br/>vbpImprovement = medicareDrg {"\u00d7"} 2% {"\u00d7"} 15% score {"\u00d7"} qualityBonus<br/>denialRecovery = revenue {"\u00d7"} 4.8% {"\u00d7"} 20% recoverable {"\u00d7"} decomFactor</F>
          <p style={{margin:"8px 0 4px"}}><strong>HRRP 3% cap, 0.33% average</strong> {" - "} Hospital Readmissions Reduction Program. Section 1886(q) SSA. ~78% of hospitals penalised in FY2025. Average penalty 0.33% (Advisory Board). <Ev s="CMS HRRP program page; Advisory Board FY2025 analysis."/></p>
          <p style={{margin:"4px 0"}}><strong>HAC 1% bottom quartile</strong> {" - "} Hospital-Acquired Condition Reduction Program. Bottom 25% of hospitals lose 1% of total Medicare payments. <Ev s="CMS HAC Reduction Program; 42 CFR 412.170-172."/></p>
          <p style={{margin:"4px 0"}}><strong>VBP 2% withhold</strong> {" - "} Value-Based Purchasing. Budget neutral: 2% withheld from all, redistributed based on performance. ~$1.7bn redistributed FY2026. <Ev s="CMS VBP program; AHA fact sheet 2025."/></p>
          <p style={{margin:"4px 0"}}><strong>11.8% denial rate</strong> {" - "} Initial claim denial rate (Kodiak Solutions 2024). Net revenue loss of 4.8% after appeals (HFMA Pulse Survey). Average denied inpatient claim value $10,000 (MDaudit 2024). <Ev s="Kodiak Solutions 2024; HFMA Pulse Survey; MDaudit 2024."/></p>
          <p style={{margin:"4px 0"}}><strong>Malpractice $2,200/bed</strong> {" - "} Institutional premium allocation. Total US malpractice system cost $55.6bn (Mello et al, Health Affairs 2010). 8% premium reduction from consolidation is a modeled assumption. <Md s="$2,200/bed is modeled. 8% reduction is assumption based on CRICO communication failure data."/></p>
          <p style={{margin:"4px 0"}}><strong>Provider type multipliers</strong> affect Medicare %, denial factor, penalty exposure, and quality bonus weighting. Critical access hospitals have limited HRRP exposure; academic centers have higher denial rates due to case complexity. <Md s="Provider multipliers are modeled estimates based on CMS program eligibility rules."/></p>
        </S>

        <S title="9. Complexity and data quality adjustments">
          <p style={{margin:"0 0 8px"}}>Two multipliers adjust the model for your specific environment.</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Setting</th><th style={{padding:"6px 10px"}}>Low / Clean</th><th style={{padding:"6px 10px"}}>Typical / Mixed</th><th style={{padding:"6px 10px"}}>High / Poor</th><th style={{padding:"6px 10px"}}>What it affects</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Complexity</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.70</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.45</td><td style={{padding:"6px 10px"}}>System costs, minutes wasted</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Data quality</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.75</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.40</td><td style={{padding:"6px 10px"}}>Minutes wasted, tickets, SAR time</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Complexity</strong> reflects how bespoke and integrated your legacy systems are. Low means off-the-shelf with simple interfaces. High means heavily customised systems with deep integrations and complex data models. Higher complexity increases both per-system costs (more expensive to run) and clinician time wasted (harder to navigate). <Md s="Designed to produce approximately +/-30% variation around baseline, consistent with observed range across US health systems."/></p>
          <p style={{margin:"4px 0"}}><strong>Data quality</strong> affects how long clinicians spend searching for information. Clean data means well-structured records with consistent coding. Poor data means duplicate records, missing fields, and inconsistent formats. Poor quality roughly doubles the effort of finding information compared to clean data. <Md s="Modeled estimate. Poor data approximately doubles effort vs clean data."/></p>
        </S>

        <S title="10. How the three input modes work">
          <p style={{margin:"0 0 8px"}}>You can provide cost data at three levels of detail, depending on what you know about your legacy estate.</p>
          <p style={{margin:"4px 0"}}><strong>Estimate (default):</strong> The calculator uses the bed-scaled tier cost formulas to estimate your annual legacy spend. Best when you do not have contract data available. In benchmarking, this covered approximately 80% of a real Trust's actual estate value.</p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems:</strong> Add your highest-cost systems individually with their actual contract values (for example, a legacy ADT/registration system at {"$"}3m/yr). The remaining systems are still costed through the tier formulas. This captures outlier contracts that generic formulas underestimate.</p>
          <p style={{margin:"4px 0"}}><strong>"I know my spend" mode:</strong> Enter your total annual legacy system spend. The calculator distributes it across tiers using a 5:2:1 weighting ratio (enterprise : departmental : standalone). You can then click any derived tier cost to fine-tune. In benchmarking, this mode produced results within 2.5% of the stated estimate.</p>
          <p style={{margin:"4px 0"}}>In all modes, you can click any individual tier cost to override it with your actual figure.</p>
        </S>

        <S title="11. What is included and excluded">
          <p style={{margin:"0 0 8px"}}><strong>Included:</strong> Decommission savings (licensing, hosting, support costs eliminated), clinician time capacity value (hours freed, valued at blended rate with realization discount), CMS penalty avoidance (HRRP, HAC, VBP), denial recovery, malpractice premium reduction, excess bed day cost avoidance, and duplicate testing reduction.</p>
          <p style={{margin:"4px 0"}}><strong>Excluded:</strong> EHR implementation costs (covered separately), parallel-run costs (too variable to model), data migration costs (one-off program budget), implementation disruption period (12-24 months of potential performance degradation per NYU Langone and VA studies), and staffing increases during transition (20%+ per VA experience).</p>
          <p style={{margin:"4px 0"}}>The 3-year total assumes flat annual savings. In practice, savings may increase in years 2-3 as more systems are retired, or decrease as easy wins are captured first.</p>
        </S>

        <div style={{marginTop:12,padding:"10px 14px",background:C.bg,borderRadius:8,fontSize:11,color:C.textMuted,lineHeight:1.6}}>
          All formulas sourced from peer-reviewed literature and federal program data. Tier costs calibrated against KLAS 2025 market data. CMS penalties verified from program pages. All figures are user-overridable. See the evidence audit document for complete citations.
        </div>
      </Card>;
    })()}

    {showFormulas && (() => {
      const sc = {decom_pct:r.decomFactor, realization:r.realization, safety:r.safetyFactor};
      const dq = DQ[inputs.data_quality_level];
      const cx = CX[inputs.complexity_level];
      const residual = r.isArchiveOnly ? 1 : 2;
      const reducible = Math.max(0, r.minsWasted - residual);
      const FormulaSection = ({color, title, total, formula, plug, source}) => (
        <div style={{marginBottom:16,padding:"14px 16px",background:"#fff",borderRadius:10,border:`1px solid ${C.borderLight}`,borderLeft:`4px solid ${color}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>{title}</div>
            <div style={{fontSize:18,fontWeight:800,color}}>{fmtK(total)}/yr</div>
          </div>
          <div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Formula</div>
          <div style={{fontSize:12,color:C.textMid,marginBottom:10,fontFamily:"ui-monospace,monospace",lineHeight:1.5,padding:"6px 8px",background:C.bg,borderRadius:4}}>{formula}</div>
          <div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Your numbers</div>
          <div style={{fontSize:12,color:C.text,marginBottom:10,fontFamily:"ui-monospace,monospace",lineHeight:1.6,padding:"6px 8px",background:`${color}11`,borderRadius:4}}>{plug}</div>
          <div style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Source</div>
          <div style={{fontSize:11,color:C.textMid,lineHeight:1.5,fontStyle:"italic"}}>{source}</div>
        </div>
      );
      return <div onClick={()=>setShowFormulas(false)} style={{position:"fixed",inset:0,background:"rgba(27,36,51,0.7)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 16px",overflowY:"auto",backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{maxWidth:760,width:"100%",background:"#f8fafb",borderRadius:14,padding:"24px 28px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontSize:22,fontWeight:800,color:C.text,margin:0}}>Why these numbers?</h2>
            <button type="button" onClick={()=>setShowFormulas(false)} style={{border:"none",background:"none",fontSize:24,color:C.textMid,cursor:"pointer",padding:"4px 12px",lineHeight:1}}>{"✕"}</button>
          </div>
          <p style={{fontSize:13,color:C.textMid,margin:"0 0 16px",lineHeight:1.6}}>Annual savings of <strong style={{color:C.accent}}>{fmtK(r.annualWithReimbursement)}</strong> for the <strong>{am === "CONSERVATIVE" ? "Conservative" : am === "STRETCH" ? "Stretch" : "Expected"}</strong> scenario, broken down below. Every figure flows from your specific inputs and the constants documented in our methodology report.</p>

          <FormulaSection
            color="#0F4146"
            title="1. Decommission savings"
            total={r.decomSave}
            formula={"Σ (tier_count × tier_cost) × decom_rate × scenario.decom + retired_flagships × scenario.decom"}
            plug={`(${r.entDecom} ent × ${fmtK(r.entCost)} + ${r.depDecom} dep × ${fmtK(r.depCost)} + ${r.nicDecom} std × ${fmtK(r.nicCost)}) + ${r.flagshipRetireCount} retired flagship${r.flagshipRetireCount===1?"":"s"} × scenario.decom (${(sc.decom_pct*100).toFixed(0)}%) = ${fmtK(r.decomSave)}/yr`}
            source={"User-defined contract values OR tier benchmarks. Scaled by complexity (×"+cx+") for "+inputs.complexity_level.toLowerCase()+" complexity. Decom rate "+(inputs.decom_retire_rate*100).toFixed(0)+"% reflects typical % of legacy systems retired in EHR migrations (60-80% normal range)."}
          />

          <FormulaSection
            color="#1a7a7a"
            title="2. Clinician capacity freed"
            total={r.timeSave}
            formula={"clinicians × (mins/wk - residual) × working_weeks / 60 × $95 × scenario.realization"}
            plug={`${fmtNum(r.clinicians)} active clinicians × ${reducible} reducible mins/wk (${r.minsWasted} - ${residual} residual) × 50 working wks / 60 = ${fmtNum(r.hrsSaved)} hrs × $95/hr × ${(sc.realization*100).toFixed(0)}% realization = ${fmtK(r.timeSave)}/yr`}
            source={"Mins/wk derived: "+r.baseMin+" base × "+dq+" data quality ("+inputs.data_quality_level.toLowerCase()+") × "+cx+" complexity × (1 + switch penalty for "+r.systemsPerUser+" systems/user). Active clinicians = total staff (beds × 3.2) × 65% active (Sinsky 2016, KLAS Arch Collab). Switch penalty: Bartek et al JIMI 2023 (PRIMARY: 2.78M EHR audit-log events; β=0.03). Hourly rate $95 = AHA blended (RN/MD/tech weighted)."}
          />

          {(r.reimbursementImpact||0) > 0 && <FormulaSection
            color="#00d4aa"
            title="3. Reimbursement impacts"
            total={r.reimbursementImpact}
            formula={"HRRP penalty reduction + HAC penalty reduction + VBP improvement + Denial recovery"}
            plug={`HRRP: ${fmtK(r.hrrpReduction)}/yr (Medicare DRG ${fmtK(r.medicareDrg)} × 0.69% avg penalty × scenario.safety)\nHAC: ${fmtK(r.hacReduction)}/yr (DRG × 1% × 25% bottom-quartile probability)\nVBP: ${fmtK(r.vbpImprovement)}/yr (DRG × 2% withhold pool × 15% improvement)\nDenial: ${fmtK(r.denialRecovery)}/yr (revenue × 4.8% denial rate × fragmentation attribution)\n= ${fmtK(r.reimbursementImpact)}/yr total`}
            source={"HRRP: CMS Section 1886(q) Social Security Act (3% max penalty, 0.69% avg). HAC: CMS HAC Reduction Program (1% Medicare reduction for bottom 25%). VBP: CMS Hospital Value-Based Purchasing (2% withhold). Denial: HFMA/AHIP industry data ($262bn annually denied, 4.8% net loss). Fragmentation attribution from Vest et al JAMIA 2019."}
          />}

          {(r.qualitySavings||0) > 0 && <FormulaSection
            color="#d4507a"
            title="4. Quality / safety financial value"
            total={r.qualitySavings}
            formula={"Malpractice reduction + Excess bed days avoided + Duplicate testing reduction + Readmission cost avoidance (VBC only)"}
            plug={`Malpractice: ${fmtK(r.malpracticeReduction)}/yr (${fmtNum(inputs.bed_count)} beds × $8,500 premium × 5% reduction × scenario.safety)\nExcess bed days: ${fmtK(r.excessDayCostAvoided)}/yr (${fmtNum(r.excessDaysAvoided)} days × $3,132/day)\nDuplicate testing: ${fmtK(r.duplicateReduction)}/yr (${fmtNum(inputs.bed_count)} beds × $8,500 lab/imaging × 25% duplicate × 50% addressable × scenario.decom)\n${r.isVBC?"Readmissions: "+fmtK(r.usReadmissionCostAvoidance)+"/yr ("+fmtNum(r.usReadmissionsAvoided)+" avoided × $16,000/each)":"Readmissions: $0 (FFS model — readmissions are billable revenue)"}\n= ${fmtK(r.qualitySavings)}/yr total`}
            source={"Malpractice: Mello et al Health Affairs 2010 ($55.6bn system cost), NPDB 2023 ($4.8bn settlements), TDC 2025 ($4bn inflation impact). $8,500/bed = 50% of inflation-adjusted estimate (conservative). CRICO 2016: 30% of malpractice claims involve communication failure. Bed days: HCUP/AHRQ ~$3,132/day acute. Duplicate testing: ONC/RAND 25% duplicate rate, $43bn/yr national. Readmissions: CMS 15.6% baseline, Vest et al 0.8pp reduction at 30% attribution."}
          />}

          {(r.academicSavings||0) > 0 && <FormulaSection
            color="#534AB7"
            title="5. Academic medical center savings"
            total={r.academicSavings}
            formula={"Research system decom + GME compliance efficiency + Teaching overhead reduction"}
            plug={`Research decom: ${fmtK(r.researchDecomSave)}/yr (${r.researchSystems} research systems × 60% retirable × scenario.decom)\nGME efficiency: ${fmtK(r.gmeEfficiency)}/yr (${fmtNum(inputs.bed_count)} beds compliance cost × 25% efficiency)\nTeaching overhead: ${fmtK(r.teachingOverhead)}/yr (12% extra complexity × 30% addressable)\n= ${fmtK(r.academicSavings)}/yr total`}
            source={"AAMC research administration cost benchmarks. ACGME GME compliance. Teaching hospital overhead: AHA Annual Survey teaching premium. Conservative addressability factors applied."}
          />}

          {(r.mergeSavings||0) > 0 && <FormulaSection
            color="#2c3e6b"
            title="6. M&A / Multi-hospital consolidation"
            total={r.mergeSavings}
            formula={"Duplicate system elimination + Infrastructure consolidation + Cross-facility standardization"}
            plug={`Duplicate elimination: ${fmtK(r.duplicateElimination)}/yr (${r.duplicateSystems} duplicate systems × ${fmtK(r.blendedCost)} blended cost)\nInfra consolidation: ${fmtK(r.infraConsolidation)}/yr (${inputs.org_count} facilities × 60% consolidatable)\nStandardization: ${fmtK(r.standardizationSave)}/yr (5% of total estate value)\n= ${fmtK(r.mergeSavings)}/yr total`}
            source={"Multi-hospital systems typically run 30% duplicate IT footprint post-acquisition (Deloitte, KLAS M&A Best Practices). Infrastructure consolidation: AHA Hospital IT Survey post-merger benchmarks."}
          />}

          <div style={{marginTop:16,padding:"14px 18px",background:C.accent,color:"#fff",borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6,opacity:0.85}}>Total annual</div>
            <div style={{fontSize:24,fontWeight:800}}>{fmtK(r.annualWithReimbursement)}/yr</div>
            <div style={{fontSize:12,marginTop:6,opacity:0.85}}>= {fmtK(r.decomSave)} decom + {fmtK(r.timeSave)} capacity{r.reimbursementImpact>0?` + ${fmtK(r.reimbursementImpact)} reimb`:""}{r.qualitySavings>0?` + ${fmtK(r.qualitySavings)} quality`:""}{r.academicSavings>0?` + ${fmtK(r.academicSavings)} academic`:""}{r.mergeSavings>0?` + ${fmtK(r.mergeSavings)} M&A`:""}</div>
          </div>

          <div style={{marginTop:14,fontSize:11,color:C.textMuted,lineHeight:1.6,fontStyle:"italic"}}>
            Scenario factors: <strong>{am === "CONSERVATIVE" ? "Conservative" : am === "STRETCH" ? "Stretch" : "Expected"}</strong> = decom ×{sc.decom_pct.toFixed(2)}, realization ×{sc.realization.toFixed(2)}, safety ×{sc.safety.toFixed(2)}. Switch scenarios above to see how the numbers shift.
          </div>

          <div style={{marginTop:14,display:"flex",justifyContent:"center"}}>
            <button type="button" onClick={()=>setShowFormulas(false)} style={{padding:"10px 24px",background:C.accent,color:"#fff",border:"none",borderRadius:999,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Close</button>
          </div>
        </div>
      </div>;
    })()}

  </div>;

  /* ── CALCULATING PAGE ──────────────────────────────────── */

  const calcSteps = [
    {label:"Analyzing your legacy estate"},
    {label:"Modeling decommission savings"},
    {label:"Estimating clinician time impact"},
  ];

  const calculatingPage = <div ref={calcPageRef} style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"55vh"}}>
    <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{width:44,height:44,margin:"0 auto 20px",border:`3px solid ${C.borderLight}`,borderTopColor:C.accent,borderRadius:"50%",animation:"calc-spin .8s linear infinite"}}/>
      <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:4}}>Calculating your ROI</h2>
      <p style={{fontSize:14,color:C.textMuted,marginBottom:28}}>Building a bespoke model from your inputs...</p>
      <div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:12}}>
        {calcSteps.map((s,i)=>{
          const done = calcStep > i, active = calcStep === i;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:12,opacity:done?1:active?0.8:0.2,transition:"opacity .4s",animation:active?"calc-fade .35s ease":"none"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:done?C.green:active?C.accent:C.borderLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {done?<span style={{color:"#fff",fontWeight:800,fontSize:12}}>{"✓"}</span>:<span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{i+1}</span>}
            </div>
            <span style={{fontSize:14,fontWeight:done||active?600:400,color:done?C.green:active?C.text:C.textMuted}}>{s.label}</span>
          </div>;
        })}
      </div>
      <div style={{marginTop:24,height:3,background:C.borderLight,borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${C.accent},${C.green})`,borderRadius:2,width:`${Math.min(calcStep/3*100,100)}%`,transition:"width .5s ease-out"}}/>
      </div>
    </div>
  </div>;

  /* ── SHELL ─────────────────────────────────────────────── */

  const fontHead = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";
  const fontBody = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";

  return <div style={{fontFamily:fontBody,background:C.bg,minHeight:"100vh",color:C.text,lineHeight:1.55,fontWeight:400,border:"1px solid #f7faf9",borderRadius:20,overflow:"hidden"}}>
    <div style={{background:C.teal,marginBottom:20}}>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px"}}><div style={{display:"flex",gap:0}}>
      {[
        { k: "inputs", l: "Your program", n: "1" },
        { k: "results", l: "ROI estimate", n: "2" },
      ].map(p => {
        const isCurrent = page === p.k || (page === "calculating" && p.k === "results");
        return (
          <button type="button" key={p.k} className="roi-tab"
            onClick={() => page !== "calculating" && setPage(p.k)}
            style={{
              flex: 1, padding: "16px 8px", border: "none",
              borderBottom: isCurrent ? "3px solid #fff" : "3px solid transparent",
              background: "transparent",
              cursor: page === "calculating" ? "default" : "pointer",
              fontFamily: fontBody, fontSize: 14, fontWeight: isCurrent ? 700 : 500,
              color: isCurrent ? "#fff" : "rgba(255,255,255,0.5)",
            }}>
            <span style={{
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              width: 22, height: 22, borderRadius: "50%",
              background: isCurrent ? "#fff" : "rgba(255,255,255,0.2)", color: isCurrent ? C.teal : "rgba(255,255,255,0.7)",
              fontSize: 11, fontWeight: 700, marginRight: 6,
            }}>{p.n}</span>
            {p.l}
          </button>
        );
      })}
    </div></div>
    </div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px 80px"}}>{page==="inputs"?inputPage:page==="calculating"?calculatingPage:resultsPage}</div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<ROICalculator />);
  </script>

  <script>
    // Iframe auto-resize: posts height to parent window
    (function() {
      if (window.self === window.top) return; // not in iframe, skip
      var last = 0;
      function postHeight() {
        var h = document.documentElement.scrollHeight;
        if (h !== last) { last = h; window.parent.postMessage({ type: "roi-calculator-resize", height: h }, "*"); }
      }
      if (window.ResizeObserver) {
        new ResizeObserver(postHeight).observe(document.documentElement);
      } else {
        setInterval(postHeight, 500);
      }
      postHeight();
    })();
  </script>
</body>
</html>
