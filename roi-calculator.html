        </div>
      );
      return <div onClick={()=>setShowFormulas(false)} style={{position:"fixed",inset:0,background:"rgba(27,36,51,0.7)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 16px",overflowY:"auto",backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{maxWidth:760,width:"100%",background:"#f8fafb",borderRadius:14,padding:"24px 28px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h2 style={{fontSize:22,fontWeight:800,color:C.text,margin:0}}>Why these numbers?</h2>
            <button type="button" onClick={()=>setShowFormulas(false)} style={{border:"none",background:"none",fontSize:24,color:C.textMid,cursor:"pointer",padding:"4px 12px",lineHeight:1}}>{"✕"}</button>
          </div>
          <p style={{fontSize:13,color:C.textMid,margin:"0 0 16px",lineHeight:1.6}}>Annual savings of <strong style={{color:C.accent}}>{fmtK(r.annualWithReimbursement)}</strong> for the <strong>{am === "CONSERVATIVE" ? "Conservative" : am === "STRETCH" ? "Stretch" : "Expected"}</strong> scenario, sector: <strong>{r.isAgedCare ? "Residential aged care" : r.isNDIS ? "NDIS provider" : "Hospital / health service"}</strong>. Every figure flows from your specific inputs and the constants in our methodology report.</p>

          <FormulaSection
            color="#0F4146"
            title="1. Decommission savings"
            total={r.decomSave}
            formula={"Σ (tier_count × tier_cost) × decom_rate × scenario.decom + retired_flagships × scenario.decom"}
            plug={`(${r.entDecom} ent × ${fmtK(r.entCost)} + ${r.depDecom} dep × ${fmtK(r.depCost)} + ${r.nicDecom} std × ${fmtK(r.nicCost)}) + ${r.flagshipRetireCount} retired flagship${r.flagshipRetireCount===1?"":"s"} × scenario.decom (${(sc.decom_pct*100).toFixed(0)}%) = ${fmtK(r.decomSave)}/yr`}
            source={"User-defined contract values OR sector-specific tier benchmarks. Scaled by complexity (×"+cx+"). Decom rate "+(inputs.decom_retire_rate*100).toFixed(0)+"% reflects typical % of legacy systems retired (60-80% normal range for AU EMR migrations)."}
          />

          <FormulaSection
            color="#1a8a7a"
            title={r.isAgedCare ? "2. Care worker capacity freed" : r.isNDIS ? "2. Support worker capacity freed" : "2. Clinician capacity freed"}
            total={r.timeSave}
            formula={"users × (mins/wk - residual) × working_weeks / 60 × A$"+sectorHourlyRate+" × scenario.realisation"}
            plug={`${fmtNum(r.clinicians)} active users × ${reducible} reducible mins/wk (${r.minsWasted} - ${residual} residual) × 48 working wks / 60 = ${fmtNum(r.hrsSaved)} hrs × A$${sectorHourlyRate}/hr × ${(sc.realisation*100).toFixed(0)}% realisation = ${fmtK(r.timeSave)}/yr`}
            source={"Mins/wk derived: "+r.baseMin+" base × "+dq+" data quality × "+cx+" complexity × (1 + switch penalty for "+r.systemsPerUser+" systems/user). Active users = total staff (NSW SDPR ratio: 3.0/bed for hospital; AC_STAFF_PER_PLACE for aged care) × 65% active (Sinsky 2016, KLAS Arch Collab). Switch penalty: Bartek et al JIMI 2023 (PRIMARY: 2.78M EHR audit-log events; β=0.03). Hourly rate "+(r.isAgedCare?"A$42 (AC weighted: AIN/PCW/RN/admin)":r.isNDIS?"A$42 (NDIS support workers + coordinators + therapy)":"A$65 (NSW Health AfP mid-band)")+"."}
          />

          {!r.isAgedCare && !r.isNDIS && (r.reimbursementImpact||0) > 0 && <FormulaSection
            color="#00d4aa"
            title="3. ABF & revenue impacts (hospital sector)"
            total={r.reimbursementImpact}
            formula={"ABF efficiency gain + Private patient revenue recovery"}
            plug={`ABF efficiency: ${fmtK(r.abfEfficiencyGain)}/yr (${fmtK(r.totalEstate)} total estate × 15% improvement opportunity × scenario.decom)\nPrivate revenue: ${fmtK(r.privateRevRecovery)}/yr (${fmtNum(r.admissionsPerYear)} admissions × private % × leakage rate × episode value × 30% recoverable)\n= ${fmtK(r.reimbursementImpact)}/yr total`}
            source={"NEP (National Efficient Price) for 2025-26 = A$7,258/NWAU per IHACPA Determination (12.3% increase from 2024-25). ABF efficiency: typical 15% optimisation potential through better coding accuracy and discharge timing. Private leakage: AIHW data on private patient billing in public hospitals."}
          />}

          {r.isAgedCare && (r.reimbursementImpact||0) > 0 && <FormulaSection
            color="#00d4aa"
            title="3. AN-ACC funding & operational savings"
            total={r.reimbursementImpact}
            formula={"AN-ACC funding uplift + Agency staff reduction + Compliance efficiency"}
            plug={`AN-ACC uplift: ${fmtK(r.acAnaccUplift)}/yr (${fmtNum(inputs.bed_count)} places × revenue × 45% AN-ACC component × uplift % × scenario.decom)\nAgency reduction: ${fmtK(r.acAgencyReduction)}/yr (staff cost × agency spend % × reduction %)\nCompliance: ${fmtK(r.acComplianceSaving)}/yr (${inputs.org_count} facilities × compliance FTE × cost)\n= ${fmtK(r.reimbursementImpact)}/yr total`}
            source={"AN-ACC: Australian National Aged Care Classification - the funding model for residential aged care since Oct 2022. Aged care reform agenda (Royal Commission 2021) drives compliance focus. Agency cost benchmarks: ACSQHC residential aged care quality indicators."}
          />}

          {r.isNDIS && (r.reimbursementImpact||0) > 0 && <FormulaSection
            color="#00d4aa"
            title="3. NDIS revenue & efficiency"
            total={r.reimbursementImpact}
            formula={"Claims accuracy + Utilisation uplift + Compliance + Staff retention"}
            plug={`Claims recovery: ${fmtK(r.ndisClaimsRecovery)}/yr (revenue × 8% rejection rate × improvement)\nUtilisation: ${fmtK(r.ndisUtilisationUplift)}/yr (staff × hours × utilisation gain × A$42/hr)\nCompliance: ${fmtK(r.ndisComplianceSaving)}/yr (per 100 participants)\nRetention: ${fmtK(r.ndisRetentionSaving)}/yr (turnover cost × reduction)\n= ${fmtK(r.reimbursementImpact)}/yr total`}
            source={"NDIS Quality and Safeguards Commission compliance frameworks. NDIS Provider Survey: 8% claims rejection baseline. Sector retention benchmarks: Department of Social Services workforce data."}
          />}

          {(r.qualitySavings||0) > 0 && <FormulaSection
            color="#d4507a"
            title={r.isAgedCare ? "4. Avoidable harm cost reduction" : "4. Quality / cost avoidance"}
            total={r.qualitySavings}
            formula={r.isAgedCare ? "places × harm cost per place × fragmentation attribution × scenario.safety" : "Indemnity reduction + Excess bed days + Duplicate testing + e-Discovery + Readmission cost avoidance"}
            plug={r.isAgedCare 
              ? `${fmtNum(inputs.bed_count)} places × harm cost × fragmentation × ${(sc.safety*100).toFixed(0)}% scenario.safety = ${fmtK(r.qualitySavings)}/yr`
              : `Indemnity: ${fmtK(r.malpracticeReduction)}/yr (${fmtNum(inputs.bed_count)} beds × A$20,000 × 5% reduction × scenario.safety)\nExcess bed days: ${fmtK(r.excessDayCostAvoided)}/yr (${fmtNum(r.excessDaysAvoided)} days × A$3,100/day)\nDuplicate testing: ${fmtK(r.duplicateReduction)}/yr (${fmtNum(inputs.bed_count)} beds × A$12,000 pathology × 22% duplicate × 50% addressable)\ne-Discovery: ${fmtK(r.ediscoverySaving)}/yr (${r.litigationCases} cases × hours saved × hourly rate)\nReadmissions: ${fmtK(r.auReadmissionCostAvoidance)}/yr (${fmtNum(r.auReadmissionsAvoided)} avoided × A$8,500/each)\n= ${fmtK(r.qualitySavings)}/yr total`
            }
            source={r.isAgedCare 
              ? "Royal Commission into Aged Care Quality and Safety findings on fragmented record harm. ACSQHC residential aged care quality indicators. Conservative attribution applied."
              : "Indemnity: VMIA 2025-26 ($380.9M / ~16k VIC beds), Mello 2010, NPDB 2023. Excess bed days: IHACPA long-stay outlier weights (A$3,100/day). Duplicate testing: Banker et al 2024, RCPA guidelines (22% duplicate rate). Readmissions: AIHW 30-day all-cause baseline. CRICO 2016: 30% comm-failure attribution."
            }
          />}

          {(r.academicSavings||0) > 0 && <FormulaSection
            color="#2c3e6b"
            title="5. Teaching hospital programme"
            total={r.academicSavings}
            formula={"Research system decom + Teaching compliance efficiency + Academic overhead reduction"}
            plug={`Research decom: ${fmtK(r.researchDecomSave)}/yr (${r.researchSystems} research systems × 60% retirable)\nTeaching efficiency: ${fmtK(r.teachingEfficiency)}/yr (${fmtNum(inputs.bed_count)} beds compliance × 25%)\nOverhead: ${fmtK(r.teachingOverhead)}/yr (12% extra complexity × 30% addressable)\n= ${fmtK(r.academicSavings)}/yr total`}
            source={"Tertiary referral hospitals carry ~12% additional IT complexity (research systems, ethics platforms, GME compliance, teaching modules). RACMA / RACS training compliance benchmarks. AHHA tertiary hospital cost benchmarks."}
          />}

          {(r.mergeSavings||0) > 0 && <FormulaSection
            color="#6c5ce7"
            title="6. Network / LHD consolidation"
            total={r.mergeSavings}
            formula={"Duplicate system elimination + Infrastructure consolidation"}
            plug={`Duplicate elimination: ${fmtK(r.duplicateElimination)}/yr (${r.duplicateSystems} duplicate systems × ${fmtK(r.depCost)} dep tier cost)\nInfra consolidation: ${fmtK(r.infraConsolidation)}/yr (LHDs/HHSs × 60% consolidatable)\n= ${fmtK(r.mergeSavings)}/yr total`}
            source={"Statewide programmes (NSW SDPR, eHealth Queensland Connecting Care, SA Health EMR) typically discover 30% duplicate IT footprint across LHDs. Australian state network benchmarks."}
          />}

          <div style={{marginTop:16,padding:"14px 18px",background:C.accent,color:"#fff",borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6,opacity:0.85}}>Total annual</div>
            <div style={{fontSize:24,fontWeight:800}}>{fmtK(r.annualWithReimbursement)}/yr</div>
            <div style={{fontSize:12,marginTop:6,opacity:0.85}}>= {fmtK(r.decomSave)} decom + {fmtK(r.timeSave)} capacity{r.reimbursementImpact>0?` + ${fmtK(r.reimbursementImpact)} ${r.isAgedCare?"AN-ACC":r.isNDIS?"NDIS rev":"ABF"}`:""}{r.qualitySavings>0?` + ${fmtK(r.qualitySavings)} quality`:""}{r.academicSavings>0?` + ${fmtK(r.academicSavings)} academic`:""}{r.mergeSavings>0?` + ${fmtK(r.mergeSavings)} network`:""}</div>
          </div>

          <div style={{marginTop:14,fontSize:11,color:C.textMuted,lineHeight:1.6,fontStyle:"italic"}}>
            Scenario factors: <strong>{am === "CONSERVATIVE" ? "Conservative" : am === "STRETCH" ? "Stretch" : "Expected"}</strong> = decom ×{sc.decom_pct.toFixed(2)}, realisation ×{sc.realisation.toFixed(2)}, safety ×{sc.safety.toFixed(2)}. Switch scenarios above to see how the numbers shift.
          </div>

          <div style={{marginTop:14,display:"flex",justifyContent:"center"}}>
            <button type="button" onClick={()=>setShowFormulas(false)} style={{padding:"10px 24px",background:C.accent,color:"#fff",border:"none",borderRadius:999,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Close</button>
          </div>
        </div>
      </div>;
    })()}

  </div>;

  /* ── CALCULATING PAGE ──────────────────────────────────── */

  const calcSteps = sector === "aged_care" ? [
    {label:"Mapping your care system landscape"},
    {label:"Modelling decommission and AN-ACC impact"},
    {label:"Estimating workforce and compliance savings"},
  ] : sector === "ndis" ? [
    {label:"Mapping your service delivery systems"},
    {label:"Modelling decommission and claims impact"},
    {label:"Estimating utilisation and retention savings"},
  ] : [
    {label:"Analysing your legacy estate"},
    {label:"Modelling decommission savings"},
    {label:"Estimating clinician time impact"},
  ];

  const calculatingPage = <div ref={calcPageRef} style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"55vh"}}>
    <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{width:44,height:44,margin:"0 auto 20px",border:`3px solid ${C.borderLight}`,borderTopColor:C.accent,borderRadius:"50%",animation:"calc-spin .8s linear infinite"}}/>
      <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:4}}>Calibrating your model</h2>
      <p style={{fontSize:14,color:C.textMuted,marginBottom:28}}>{sector === "aged_care" ? "Building your aged care ROI model..." : sector === "ndis" ? "Building your NDIS ROI model..." : "Building a bespoke model from your inputs..."}</p>
      <div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:12}}>
        {calcSteps.map((s,i)=>{
          const done = calcStep > i, active = calcStep === i;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:12,opacity:done?1:active?0.8:0.2,transition:"opacity .4s",animation:active?"calc-fade .35s ease":"none"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:done?C.green:active?C.accent:C.borderLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {done?<span style={{color:"#fff",fontWeight:800,fontSize:12}}>{"✓"}</span>:<span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{i+1}</span>}
            </div>
            <span style={{fontSize:14,fontWeight:done||active?600:400,color:done?C.green:active?C.text:C.textMuted}}>{s.label}</span>
          </div>;
        })}
      </div>
      <div style={{marginTop:24,height:3,background:C.borderLight,borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${C.accent},${C.green})`,borderRadius:2,width:`${Math.min(calcStep/3*100,100)}%`,transition:"width .5s ease-out"}}/>
      </div>
    </div>
  </div>;

  /* ── SHELL ─────────────────────────────────────────────── */

  const fontHead = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";
  const fontBody = "'FK Grotesk Neue','FK Grotesk','Inter','Helvetica Neue',Helvetica,sans-serif";

  return <div style={{fontFamily:fontBody,background:C.bg,minHeight:"100vh",color:C.text,lineHeight:1.55,fontWeight:400,border:"1px solid #f7faf9",borderRadius:20,overflow:"hidden"}}>
    <div style={{background:C.teal,marginBottom:20}}>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px"}}><div style={{display:"flex",gap:0}}>
      {[
        { k: "inputs", l: "Your programme", n: "1" },
        { k: "results", l: "ROI estimate", n: "2" },
      ].map(p => {
        const isCurrent = page === p.k || (page === "calculating" && p.k === "results");
        return (
          <button type="button" key={p.k} className="roi-tab"
            onClick={() => page !== "calculating" && setPage(p.k)}
            style={{
              flex: 1, padding: "16px 8px", border: "none",
              borderBottom: isCurrent ? "3px solid #fff" : "3px solid transparent",
              background: "transparent",
              cursor: page === "calculating" ? "default" : "pointer",
              fontFamily: fontBody, fontSize: 14, fontWeight: isCurrent ? 700 : 500,
              color: isCurrent ? "#fff" : "rgba(255,255,255,0.5)",
            }}>
            <span style={{
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              width: 22, height: 22, borderRadius: "50%",
              background: isCurrent ? "#fff" : "rgba(255,255,255,0.2)", color: isCurrent ? C.teal : "rgba(255,255,255,0.7)",
              fontSize: 11, fontWeight: 700, marginRight: 6,
            }}>{p.n}</span>
            {p.l}
          </button>
        );
      })}
    </div></div></div>
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px 80px"}}>{page==="inputs"?inputPage:page==="calculating"?calculatingPage:resultsPage}</div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<ROICalculator />);
  </script>

  <script>
    // Iframe auto-resize: posts height to parent window
    (function() {
      if (window.self === window.top) return; // not in iframe, skip
      var last = 0;
      function postHeight() {
        var h = document.documentElement.scrollHeight;
        if (h !== last) { last = h; window.parent.postMessage({ type: "roi-calculator-resize", height: h }, "*"); }
      }
      if (window.ResizeObserver) {
        new ResizeObserver(postHeight).observe(document.documentElement);
      } else {
        setInterval(postHeight, 500);
      }
      postHeight();
    })();
  </script>
</body>
</html>
