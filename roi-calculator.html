/* ═══════════════════════════════════════════════════════════════
   ROI Calculator - Animations & Interactions
   ═══════════════════════════════════════════════════════════════ */

/* ── Keyframe animations ── */
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 2px 12px rgba(15,65,70,.3); }
  50% { box-shadow: 0 2px 24px rgba(15,65,70,.55); }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes think-fill {
  0% { width: 0%; }
  15% { width: 20%; }
  40% { width: 45%; }
  65% { width: 70%; }
  85% { width: 88%; }
  100% { width: 100%; }
}
@keyframes think-pulse {
  0%, 100% { opacity: .4; }
  50% { opacity: 1; }
}
@keyframes calc-fade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes calc-spin {
  to { transform: rotate(360deg); }
}

/* ── Card hover ── */
.roi-card {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease;
}
.roi-card:hover {
  border-color: rgba(15,65,70,.25) !important;
  box-shadow: 0 2px 12px rgba(15,65,70,.08);
}

/* ── Generic button hover ── */
.roi-btn {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-btn:hover {
  border-color: rgba(15,65,70,.35) !important;
  box-shadow: 0 2px 16px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-btn:active {
  transform: translateY(0);
  box-shadow: 0 1px 4px rgba(15,65,70,.12);
}

/* ── Toggle pill (overrides roi-btn lift for flush buttons) ── */
.roi-toggle-pill .roi-btn {
  transform: none !important;
  box-shadow: none !important;
  border-color: transparent !important;
}
.roi-toggle-pill .roi-btn:hover {
  transform: none !important;
  box-shadow: none !important;
  opacity: .85;
}

/* ── Preset buttons ── */
.roi-preset {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-preset:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-preset:active {
  transform: translateY(0);
}

/* ── Tier cards ── */
.roi-tier {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-tier:hover {
  box-shadow: 0 2px 14px rgba(15,65,70,.08);
  border-color: rgba(15,65,70,.2) !important;
}

/* ── Text links ── */
.roi-link {
  transition: color .15s ease, opacity .15s ease;
}
.roi-link:hover {
  opacity: .7;
}

/* ── Clickable cost display ── */
.roi-cost {
  transition: border-color .2s ease, color .15s ease;
}
.roi-cost:hover {
  border-bottom-color: rgba(15,65,70,.5) !important;
}

/* ── Result cards ── */
.roi-result {
  transition: box-shadow .2s ease, transform .15s ease, border-color .2s ease;
}
.roi-result:hover {
  box-shadow: 0 4px 20px rgba(15,65,70,.1);
  transform: translateY(-2px);
  border-color: rgba(15,65,70,.15) !important;
}

/* ── Scenario chooser ── */
.roi-scenario {
  transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease, background .15s ease;
}
.roi-scenario:hover {
  border-color: rgba(15,65,70,.3) !important;
  box-shadow: 0 2px 14px rgba(15,65,70,.1);
  transform: translateY(-1px);
}
.roi-scenario:active {
  transform: translateY(0);
}

/* ── Flagship rows ── */
.roi-flag {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-flag:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 2px 10px rgba(15,65,70,.06);
}

/* ── Tab buttons ── */
.roi-tab {
  transition: background .15s ease, color .15s ease;
}
.roi-tab:hover {
  background: rgba(15,65,70,.04) !important;
}

/* ── Slider hover ── */
.roi-slider {
  transition: opacity .15s ease;
}
.roi-slider:hover input[type="range"] {
  filter: brightness(.95);
}
.roi-slider input[type="range"] {
  transition: filter .15s ease;
}

/* ── Per-org rows ── */
.roi-org {
  transition: border-color .2s ease, box-shadow .2s ease;
}
.roi-org:hover {
  border-color: rgba(15,65,70,.2) !important;
  box-shadow: 0 1px 8px rgba(15,65,70,.06);
}

/* ── CTA button ── */
.roi-cta {
  transition: box-shadow .2s ease, transform .15s ease;
}
.roi-cta:hover {
  box-shadow: 0 4px 24px rgba(15,65,70,.2) !important;
  transform: translateY(-1px);
}
.roi-cta:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(15,65,70,.15) !important;
}

/* ═══════════════════════════════════════════════════════════════
   Mobile & Touch
   ═══════════════════════════════════════════════════════════════ */

/* On touch devices, disable hover transforms to prevent sticky states */
@media (hover: none) {
  .roi-btn:hover,
  .roi-preset:hover,
  .roi-result:hover,
  .roi-scenario:hover {
    transform: none !important;
  }

  /* Use :active for tactile feedback instead */
  .roi-btn:active,
  .roi-preset:active,
  .roi-scenario:active {
    background: rgba(15,65,70,.06) !important;
  }

  .roi-result:active {
    box-shadow: 0 2px 10px rgba(15,65,70,.1) !important;
  }

  .roi-tier:active {
    border-color: rgba(15,65,70,.25) !important;
  }
}

/* Narrow screens */
@media (max-width: 480px) {
  /* Ensure range inputs are fat enough to thumb-drag */
  input[type="range"] {
    height: 32px;
    min-height: 32px;
  }

  /* Stack flagship rows vertically */
  .roi-flag {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 8px !important;
  }

  /* Toggle pill: ensure text doesn't clip */
  .roi-toggle-pill .roi-btn {
    padding: 10px 12px !important;
    font-size: 12px !important;
  }
}


/* Email form placeholder */
.roi-lead-input::placeholder {
  color: rgba(255, 255, 255, 0.5) !important;
  opacity: 1;
}
.roi-lead-input::-webkit-input-placeholder { color: rgba(255, 255, 255, 0.5) !important; }
.roi-lead-input::-moz-placeholder { color: rgba(255, 255, 255, 0.5) !important; }
  /* Hide number input spinners on facility counters */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  <script type="text/babel">
const { useState, useMemo, useCallback, useRef, useEffect } = React;

/* ═══════════════════════════════════════════════════════════════════════
   HOOKS
   ═══════════════════════════════════════════════════════════════════════ */

function useCountUp(target, duration = 1200, active = true) {
  const [display, setDisplay] = useState(0);
  const ref = useRef({ from: 0, to: 0, startTime: 0, raf: null, hasRun: false });
  useEffect(() => {
    if (!active) { setDisplay(0); ref.current.hasRun = false; return; }
    const r = ref.current;
    const from = r.hasRun ? display : 0;
    const dur = r.hasRun ? 600 : duration;
    r.from = from; r.to = target; r.startTime = performance.now(); r.hasRun = true;
    if (r.raf) cancelAnimationFrame(r.raf);
    const tick = (now) => {
      const p = Math.min((now - r.startTime) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(r.from + (r.to - r.from) * eased);
      if (p < 1) r.raf = requestAnimationFrame(tick);
    };
    r.raf = requestAnimationFrame(tick);
    return () => { if (r.raf) cancelAnimationFrame(r.raf); };
  }, [target, active]);
  return Math.round(display);
}
function AnimatedNum({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v.toLocaleString("en-AU")}</span>; }
function AnimatedK({ value, active }) { const v = useCountUp(value, 1200, active); return <span>{v >= 1e6 ? `A$${(v/1e6).toFixed(1)}m` : v >= 1000 ? `A$${Math.round(v/1000).toLocaleString("en-AU")}k` : `A$${v.toLocaleString("en-AU")}`}</span>; }

/* ═══════════════════════════════════════════════════════════════════════
   CALC ENGINE - tiered systems, bed-scaled costs, no parallel-run
   ═══════════════════════════════════════════════════════════════════════ */

const SCENARIO = {
  CONSERVATIVE: { decom_pct: 0.85, realisation: 0.20, safety: 0.15 },
  EXPECTED:     { decom_pct: 1.00, realisation: 0.30, safety: 0.25 },
  STRETCH:      { decom_pct: 1.10, realisation: 0.40, safety: 0.35 },
  DELAYED:      { decom_pct: 0.70, realisation: 0.15, safety: 0.10 }, // 12-month programme delay
  PARTIAL:      { decom_pct: 0.50, realisation: 0.20, safety: 0.15 }, // Only 50% of systems retired
};
const CX = { LOW: 0.7, TYPICAL: 1.0, HIGH: 1.45 };
const DQ = { CLEAN: 0.75, MIXED: 1.0, POOR: 1.4 };

function tierCost(tier, beds, cx) {
  const base = tier === "enterprise" ? 250000 : tier === "departmental" ? 65000 : 12000;
  const perBed = tier === "enterprise" ? 600 : tier === "departmental" ? 140 : 18;
  const maxCost = tier === "enterprise" ? 8000000 : tier === "departmental" ? 500000 : 80000;
  return Math.min(maxCost, Math.round(((base + beds * perBed) * cx) / 1000) * 1000);
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function calc(inp, mode, ov = {}, flagships = []) {
  const sc = SCENARIO[mode], cx = CX[inp.complexity_level], dq = DQ[inp.data_quality_level];
  const isArchiveOnly = inp.journey === "HAVE_EPR";
  const sector = (inp._providerType || "") === "aged_care" ? "aged_care"
               : (inp._providerType || "") === "ndis_provider" ? "ndis" : "hospital";
  const isAgedCare = sector === "aged_care";
  const isNDIS = sector === "ndis";
  const ent = ov.enterprise != null ? ov.enterprise : inp.tiers.enterprise;
  const dep = ov.departmental != null ? ov.departmental : inp.tiers.departmental;
  const nic = ov.niche != null ? ov.niche : inp.tiers.niche;
  const tieredLegacy = ent + dep + nic;
  const entCost = ov.entCost != null ? ov.entCost : tierCost("enterprise", inp.bed_count, cx);
  const depCost = ov.depCost != null ? ov.depCost : tierCost("departmental", inp.bed_count, cx);
  const nicCost = ov.nicCost != null ? ov.nicCost : tierCost("niche", inp.bed_count, cx);
  const tieredEstate = ent * entCost + dep * depCost + nic * nicCost;
  // Flagships
  const flagshipTotal = flagships.reduce((s,f) => s + (f.cost || 0), 0); // All flagships affect estate cost
  const flagshipDecomSave = flagships.filter(f => f.retire).reduce((s,f) => s + (f.cost || 0), 0); // All retiring flagships contribute savings
  const flagshipCount = flagships.length; // All flagships are additive to tier count
  const flagshipRetireCount = flagships.filter(f => f.retire).length;
  const portfolioSystems = inp._portfolioSystems || 0;
  const legacy = tieredLegacy + flagshipCount + portfolioSystems;
  const totalEstate = tieredEstate + flagshipTotal + (inp._portfolioCost ?? 0);
  const blendedCost = legacy > 0 ? Math.round(totalEstate / legacy) : 0;
  const rawDecom = tieredLegacy * inp.decom_retire_rate * sc.decom_pct;
  const decom = Math.min(Math.round(rawDecom), tieredLegacy) + flagshipRetireCount + (Math.round(portfolioSystems * inp.decom_retire_rate * sc.decom_pct) || 0);
  const decomFrac = tieredLegacy > 0 ? Math.min(Math.round(rawDecom), tieredLegacy) / tieredLegacy : 0;
  const entDecom = Math.min(Math.round(ent * decomFrac), ent);
  const depDecom = Math.min(Math.round(dep * decomFrac), dep);
  const nicDecom = clamp(Math.min(Math.round(rawDecom), tieredLegacy) - entDecom - depDecom, 0, nic);
  const portfolioDecomSave = Math.round((inp._portfolioCost ?? 0) * inp.decom_retire_rate * sc.decom_pct);
  const portfolioDecom = Math.round(portfolioSystems * inp.decom_retire_rate * sc.decom_pct);
  const decomSave = entDecom * entCost + depDecom * depCost + nicDecom * nicCost + Math.round(flagshipDecomSave * sc.decom_pct) + portfolioDecomSave;
  const corpPerOrg = Math.min(100, Math.round(CORPORATE_STAFF_BASE + (inp.bed_count / Math.max(1, inp.org_count)) * CORPORATE_STAFF_PER_BED));
  const staffPerUnit = isAgedCare ? AC_STAFF_PER_PLACE : isNDIS ? (NDIS_STAFF_PER_PARTICIPANT * 10) : STAFF_PER_BED;
  const hourlyRate = isAgedCare ? AC_BLENDED_HOURLY : isNDIS ? NDIS_BLENDED_HOURLY : BLENDED_HOURLY_RATE;
  const totalStaff = Math.round(inp.bed_count * staffPerUnit + (sector === "hospital" ? inp.org_count * corpPerOrg : 0) + (inp._portfolioStaff ?? 0));
  const clinicians = ov.clinicians != null ? ov.clinicians : Math.round(totalStaff * ACTIVE_USER_PCT);
  const systemsPerUser = Math.max(2, Math.round(legacy * SYSTEM_EXPOSURE_PCT));
  const switchPenalty = Math.max(0, systemsPerUser - 1) * SWITCH_PENALTY_PER_SYSTEM;
  // Base minutes wasted per clinician per week navigating legacy systems
  // HAVE_EPR (8 mins): clinicians still look up historical data in unarchived systems,
  //   re-key results, and context-switch. Lower than EVALUATING because the main
  //   workflow is already on the EMR. Evidence: Westbrook et al 2020 time-motion studies.
  // EVALUATING (12 mins): no single EMR, all clinical work spans multiple systems.
  const baseMin = isArchiveOnly ? 8 : 12;
  const cappedPenalty = Math.min(switchPenalty, 4.0); // Cap: prevents >60 min/wk at extreme system counts
  const complexityBoost = inp._complexityBoost ?? 1.0;
  const minsWasted = ov.minsWasted != null ? ov.minsWasted : Math.round(baseMin * dq * cx * complexityBoost * (1 + cappedPenalty));
  const residual = isArchiveOnly ? 1 : 2;
  const hrsSaved = Math.round((clinicians * Math.max(0, minsWasted - residual) * WORKING_WEEKS) / 60);
  const timeSave = Math.round(hrsSaved * hourlyRate * sc.realisation);
  const ticketsBaselineMonthly = ov.ticketsBaseline != null ? ov.ticketsBaseline : Math.round(legacy * TICKETS_PER_SYSTEM * dq);
  const ticketsAfter = Math.min(Math.round((legacy - decom) * TICKETS_PER_SYSTEM * dq * SURVIVING_SYSTEM_TICKET_FACTOR), ticketsBaselineMonthly);
  const ticketsReductionPct = Math.round((ticketsBaselineMonthly - ticketsAfter) / Math.max(1, ticketsBaselineMonthly) * 100);
  const sarSystemsCapped = Math.min(legacy, 20); // Records requests search core clinical systems, not every niche tool
  const sarDaysBefore = ov.sarDaysBefore != null ? ov.sarDaysBefore : Math.round((SAR_BASE_DAYS + sarSystemsCapped * SAR_DAYS_PER_SYSTEM_BEFORE * dq) * 10) / 10;
  const sarDaysAfter = Math.min(Math.round((SAR_BASE_DAYS + Math.min(legacy - decom, 20) * SAR_DAYS_PER_SYSTEM_AFTER) * 10) / 10, sarDaysBefore);
  const sarReductionPct = Math.round((sarDaysBefore - sarDaysAfter) / Math.max(1, sarDaysBefore) * 100);
  const hasClinicalScope = legacy >= 3 && inp.bed_count > 0;
  let safetyMedErrorsAvoided=0, safetyPatientsProtected=0, safetyBedDaysAvoided=0, safetyMedErrorsBaseline=0;
  if (hasClinicalScope) {
    const frag = 0.6 + Math.min(legacy, 20) / 20 * 0.6;
    safetyMedErrorsBaseline = Math.round(inp.bed_count * MED_ERRORS_PER_BED * frag * dq);
    const harmedBl = Math.round(inp.bed_count * PATIENTS_HARMED_PER_BED * FRAGMENTATION_ATTRIBUTION * frag * dq);
    const bedDaysBl = Math.round(inp.bed_count * EXCESS_BED_DAYS_PER_BED * FRAGMENTATION_ATTRIBUTION * frag * dq);
    safetyMedErrorsAvoided = Math.round(safetyMedErrorsBaseline * sc.safety);
    safetyPatientsProtected = Math.round(harmedBl * sc.safety);
    safetyBedDaysAvoided = Math.round(bedDaysBl * sc.safety);
  }
  // ── Sector-Specific Impact ──
  let occupancy=0, admissionsPerYear=0, estAnnualRevenueCalc=0, estMedicareDrgRevenue=0, medicareDrg=0;
  let abfEfficiencyGain=0, hrrpExposure=0, hrrpReduction=0, hacExposure=0, hacReduction=0;
  let vbpPool=0, vbpImprovement=0, denialBaseline=0, denialRecovery=0;
  let privatePct=0, privateLeakage=0, privateRevRecovery=0;
  let malpracticePremium=0, malpracticeReduction=0;
  let preventableADEs=0, excessDaysAvoided=0, excessDayCostAvoided=0;
  let estLabSpend=0, duplicateWaste=0, duplicateReduction=0;
  // Sector-specific
  let acAnaccUplift=0, acAgencyReduction=0, acComplianceSaving=0, acHarmAvoidance=0;
  let ndisClaimsRecovery=0, ndisUtilisationUplift=0, ndisComplianceSaving=0, ndisRetentionSaving=0;

  if (isAgedCare) {
    // AN-ACC funding optimisation
    const totalRevenue = inp.bed_count * AC_REVENUE_PER_PLACE;
    acAnaccUplift = Math.round(totalRevenue * 0.45 * AC_ANACC_UPLIFT * sc.decom_pct);
    // Agency staff cost reduction
    const acStaffCost = inp.bed_count * AC_STAFF_PER_PLACE * AC_BLENDED_HOURLY * 1824;
    acAgencyReduction = Math.round(acStaffCost * AC_AGENCY_SPEND_PCT * AC_AGENCY_REDUCTION * sc.decom_pct);
    // Compliance efficiency
    acComplianceSaving = Math.round(inp.org_count * AC_COMPLIANCE_FTE_PER_FACILITY * AC_COMPLIANCE_COST_PER_FTE * sc.decom_pct * 0.5);
    // Avoidable cost of harm
    acHarmAvoidance = Math.round(inp.bed_count * AC_HARM_COST_PER_PLACE * AC_FRAGMENTATION_ATTRIBUTION * sc.safety);

  } else if (isNDIS) {
    // Claims accuracy
    const ndisRevenue = inp.bed_count * NDIS_REVENUE_PER_PARTICIPANT;
    // 8% of NDIS claims are rejected; 5% improvement in rejection rate through better documentation
    ndisClaimsRecovery = Math.round(ndisRevenue * 0.08 * NDIS_CLAIMS_IMPROVEMENT * sc.decom_pct);
    // Utilisation improvement
    const ndisStaff = Math.round(inp.bed_count * NDIS_STAFF_PER_PARTICIPANT);
    const baseHrs = ndisStaff * 1824 * NDIS_UTILISATION_BASELINE;
    const improvedHrs = ndisStaff * 1824 * (NDIS_UTILISATION_BASELINE + NDIS_UTILISATION_UPLIFT * sc.decom_pct);
    ndisUtilisationUplift = Math.round((improvedHrs - baseHrs) * NDIS_BLENDED_HOURLY);
    // Compliance cost reduction
    ndisComplianceSaving = Math.round((inp.bed_count / 100) * NDIS_COMPLIANCE_FTE_PER_100 * NDIS_COMPLIANCE_COST_PER_FTE * sc.decom_pct * 0.5);
    // Staff retention saving
    const ndisTurnoverCost = ndisStaff * NDIS_TURNOVER_RATE * NDIS_TURNOVER_COST;
    ndisRetentionSaving = Math.round(ndisTurnoverCost * NDIS_TURNOVER_REDUCTION * sc.decom_pct);

  } else {
    // Hospital sector - original AU calculations
    occupancy = inp._occupancy ?? DEFAULT_OCCUPANCY;
    admissionsPerYear = Math.round(inp.bed_count * (365 / AU_AVG_ALOS) * occupancy);
    estAnnualRevenueCalc = admissionsPerYear * AU_NWAU_PER_SEPARATION * AU_NWAU_PRICE;
    estMedicareDrgRevenue = Math.round(estAnnualRevenueCalc * 0.70);
    medicareDrg = inp._medicareDrgRevenue > 0 ? inp._medicareDrgRevenue : estMedicareDrgRevenue;
    abfEfficiencyGain = Math.round(totalEstate * 0.15 * sc.decom_pct);
    privatePct = inp._privatePct ?? 0.15;
    privateLeakage = Math.round(admissionsPerYear * privatePct * PRIVATE_PATIENT_LEAKAGE * PRIVATE_EPISODE_AVG_VALUE);
    privateRevRecovery = Math.round(privateLeakage * 0.30 * sc.decom_pct);
    malpracticePremium = inp.bed_count * INDEMNITY_COST_PER_BED;
    malpracticeReduction = Math.round(malpracticePremium * INDEMNITY_REDUCTION_PCT * sc.safety);
    preventableADEs = Math.round(admissionsPerYear / 100 * PREVENTABLE_ADE_PER_100_ADMITS);
    excessDaysAvoided = hasClinicalScope ? safetyBedDaysAvoided : Math.round(preventableADEs * EXCESS_DAYS_PER_ADE * sc.safety);
    excessDayCostAvoided = Math.round(excessDaysAvoided * COST_PER_EXCESS_BED_DAY);
    estLabSpend = inp.bed_count * PATHOLOGY_COST_PER_BED;
    duplicateWaste = estLabSpend * DUPLICATE_TEST_RATE;
    duplicateReduction = Math.round(duplicateWaste * 0.50 * sc.decom_pct);
  }

  // ── Teaching Hospital Module ──
  const isAcademic = inp._providerType === "tertiary";
  const researchSystems = isAcademic ? Math.round(inp.bed_count / 100 * RESEARCH_SYSTEMS_PER_100_BEDS) : 0;
  const researchSystemCost = researchSystems * RESEARCH_SYSTEM_AVG_COST;
  const researchDecomSave = Math.round(researchSystemCost * 0.60 * sc.decom_pct); // 60% retirable
  const teachingComplianceCost = isAcademic ? Math.round(inp.bed_count * TEACHING_COMPLIANCE_COST_PER_BED) : 0;
  const teachingEfficiency = Math.round(teachingComplianceCost * 0.25 * sc.decom_pct); // 25% efficiency gain
  const teachingOverhead = isAcademic ? Math.round(totalEstate * TEACHING_OVERHEAD_PCT * 0.30 * sc.decom_pct) : 0; // 30% of 12% extra complexity

  // ── Network Consolidation Module ──
  const isMultiHospital = inp._providerType === "state_network" || inp._providerType === "statewide";
  const survivingSystems = legacy - decom;
  const duplicateSystems = isMultiHospital ? Math.round(survivingSystems * DUPLICATE_SYSTEM_RATE) : 0;
  const duplicateSystemCost = isMultiHospital ? Math.round(duplicateSystems * depCost) : 0; // Use dep tier cost - duplicates are departmental/niche, not enterprise
  const duplicateElimination = Math.round(duplicateSystemCost * sc.decom_pct);
  const lhdCount = inp._lhdCount || Math.max(1, Math.round(inp.org_count / 15)); // LHDs/HHSs, not individual hospitals
  const duplicateInfraCost = isMultiHospital ? lhdCount * DUPLICATE_INFRA_COST_PER_FACILITY : 0;
  const infraConsolidation = Math.round(duplicateInfraCost * 0.60 * sc.decom_pct); // 60% consolidatable
  // standardisationSave removed - identical formula to abfEfficiencyGain (both totalEstate*15%), was double-counting
  const standardisationSave = 0;

  // ── Legal & Compliance ──
  const litigationCases = isAgedCare || isNDIS ? 0 : Math.round(inp.bed_count / 100 * AU_EDISCOVERY_CASES_PER_100_BEDS);
  const ediscoverySaveBefore = litigationCases * AU_EDISCOVERY_HRS_PER_CASE_BEFORE * AU_EDISCOVERY_HOURLY_RATE;
  const ediscoverySaveAfter = litigationCases * AU_EDISCOVERY_HRS_PER_CASE_AFTER * AU_EDISCOVERY_HOURLY_RATE;
  const ediscoverySaving = Math.round((ediscoverySaveBefore - ediscoverySaveAfter) * sc.decom_pct);
  const cyberSystemsRetired = Math.max(0, decom - 1); // -1 for the new archive system

  // ── Readmission cost avoidance (hospital sector only) ──
  const auReadmissions = isAgedCare || isNDIS ? 0 : Math.round(admissionsPerYear * AU_READMISSION_RATE);
  const auReadmissionsAvoided = Math.round(admissionsPerYear * AU_READMIT_REDUCTION * AU_READMIT_FRAGMENTATION_ATTRIBUTION * sc.safety);
  const auReadmissionCostAvoidance = Math.round(auReadmissionsAvoided * AU_READMIT_COST);

  // Module totals
  const academicSavings = researchDecomSave + teachingEfficiency + teachingOverhead;
  const mergeSavings = duplicateElimination + infraConsolidation + standardisationSave;

  // Total reimbursement impact
  const reimbursementImpact = isAgedCare ? (acAnaccUplift + acAgencyReduction + acComplianceSaving)
                           : isNDIS ? (ndisClaimsRecovery + ndisUtilisationUplift + ndisComplianceSaving + ndisRetentionSaving)
                           : abfEfficiencyGain + privateRevRecovery;
  const qualitySavings = isAgedCare ? acHarmAvoidance
                     : isNDIS ? 0
                     : malpracticeReduction + excessDayCostAvoided + duplicateReduction + ediscoverySaving + auReadmissionCostAvoidance;

  const annual = decomSave + timeSave;
  const annualWithReimbursement = annual + reimbursementImpact + qualitySavings + academicSavings + mergeSavings;
  // Phased ramp: configurable 3-year or 5-year
  const rampN = inp._rampYears || 3;
  const rampPcts = rampN === 5
    ? [0.20, 0.40, 0.60, 0.80, 1.00]
    : [0.40, 0.80, 1.00];
  const y1Pct = rampPcts[0], y2Pct = rampPcts[1], y3Pct = rampPcts[2] || 1.0;
  const yrValues = rampPcts.map(p => Math.round(annual * p));
  const yr1 = yrValues[0], yr2 = yrValues[1], yr3 = yrValues[2] || 0;
  const total3 = yrValues.reduce((a,b) => a+b, 0);
  const yrRValues = rampPcts.map(p => Math.round(annualWithReimbursement * p));
  const yr1R = yrRValues[0], yr2R = yrRValues[1], yr3R = yrRValues[2] || 0;
  const total3WithReimbursement = yrRValues.reduce((a,b) => a+b, 0);
  return {
    legacy, ent, dep, nic, entCost, depCost, nicCost, blendedCost, totalEstate,
    decom, entDecom, depDecom, nicDecom, decomSave,
    totalStaff, clinicians, systemsPerUser, minsWasted, hrsSaved, timeSave, baseMin,
    ticketsBaselineMonthly, ticketsAfter, ticketsReductionPct,
    sarDaysBefore, sarDaysAfter, sarReductionPct,
    hasClinicalScope, safetyMedErrorsAvoided, safetyPatientsProtected,
    safetyBedDaysAvoided, safetyMedErrorsBaseline,
    annual, total3, yr1, yr2, yr3, y1Pct, y2Pct, y3Pct, rampN, rampPcts, yrValues, yrRValues, realisation: sc.realisation, decomFactor: sc.decom_pct, safetyFactor: sc.safety, isArchiveOnly,
    flagshipTotal, flagshipDecomSave: Math.round(flagshipDecomSave * sc.decom_pct),
    flagshipCount, flagshipRetireCount,
    // ABF efficiency and compliance
    admissionsPerYear, estAnnualRevenueCalc, occupancy, medicareDrg,
    abfEfficiencyGain, privateRevRecovery,
    hrrpExposure, hrrpReduction, hacExposure, hacReduction,
    vbpPool, vbpImprovement, denialBaseline, denialRecovery,
    malpracticePremium, malpracticeReduction,
    preventableADEs, excessDaysAvoided, excessDayCostAvoided,
    duplicateWaste, duplicateReduction,
    reimbursementImpact, qualitySavings,
    // Academic module
    isAcademic, researchSystems, researchSystemCost, researchDecomSave,
    teachingComplianceCost, teachingEfficiency, teachingOverhead, academicSavings,
    // M&A module
    isMultiHospital, duplicateSystems, duplicateSystemCost, duplicateElimination,
    duplicateInfraCost, infraConsolidation, standardisationSave, mergeSavings,
    litigationCases, ediscoverySaving, cyberSystemsRetired,
    auReadmissions, auReadmissionsAvoided, auReadmissionCostAvoidance,
    sector, isAgedCare, isNDIS,
    acAnaccUplift, acAgencyReduction, acComplianceSaving, acHarmAvoidance,
    ndisClaimsRecovery, ndisUtilisationUplift, ndisComplianceSaving, ndisRetentionSaving,
    annualWithReimbursement, total3WithReimbursement, yr1R, yr2R, yr3R,
    // Phase 1: Benefit categorisation
    fteEquivalent: Math.round(hrsSaved * sc.realisation / 1824 * 10) / 10, // Realised FTE: hrs × realisation / 1,824 (38hr × 48wk)
    cashable: decomSave + abfEfficiencyGain + privateRevRecovery + duplicateElimination + infraConsolidation,
    nonCashable: timeSave + (isAcademic ? teachingEfficiency + teachingOverhead + researchDecomSave : 0),
    costAvoidance: malpracticeReduction + excessDayCostAvoided + duplicateReduction + ediscoverySaving + auReadmissionCostAvoidance,
  };
}

function systemCost(sys, beds) {
  const raw = Math.round(((sys.baseCost || 250000) + (sys.perBed || 0) * beds) / 1000) * 1000;
  const tierTypeCaps = { EMR:20000000, 'EMR/PAS':20000000, PAS:15000000, Clinical:3000000, Theatre:500000, Radiology:500000, LIMS:500000, Pharmacy:500000, Maternity:500000, Integration:500000, eMeds:500000, Dictation:200000, ECM:200000, Incident:200000 };
  const cap = tierTypeCaps[sys.type] || 8000000;
  return Math.min(raw, cap);
}

  { key: "licensing", label: "Licensing / subscription", pct: 0.35 },

  { key: "support", label: "Support & maintenance", pct: 0.20 },
  { key: "interfaces", label: "Interfaces / integrations", pct: 0.15 },
  { key: "other", label: "Other (training, admin)", pct: 0.10 },
];
function defaultLineItems(total) {
  const items = {};
  COST_CATEGORIES.forEach(c => { items[c.key] = Math.round(total * c.pct / 1000) * 1000; });
  // Adjust first item to absorb rounding
  const sum = Object.values(items).reduce((a,b) => a+b, 0);
  items.licensing += (total - sum);
  return items;
}
function lineItemTotal(items) {
  if (!items) return 0;
  return Object.values(items).reduce((a,b) => a + (b || 0), 0);
}

function InfoTip({text}){
  const[show,setShow]=useState(false);const[pos,setPos]=useState("above");const ref=useRef(null);

function OverridableStat({label,computed,override,onOverride,prefix,suffix,step:st,info,inline}){
  const[editing,setEditing]=useState(false);const val=override!=null?override:computed;const isOv=override!=null;const dc=isOv?C.override:C.text;
  if(editing)return<div style={{minWidth:inline?0:130,flex:inline?undefined:"1 1 130px"}}>
    {label&&<div style={{fontSize:12,fontWeight:600,color:C.textMuted,letterSpacing:".01em",marginBottom:2,display:"flex",alignItems:"center"}}>{label}{info&&<InfoTip text={info}/>}</div>}
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <input autoFocus type="number" step={st || 1} defaultValue={val}
        onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v !== computed) onOverride(v); else if (v === computed) onOverride(null); setEditing(false); }}
        onKeyDown={e => { if (e.key === "Enter") e.target.blur(); if (e.key === "Escape") { onOverride(null); setEditing(false); } }}
        style={{ width: 100, padding: "4px 8px", border: `2px solid ${C.accent}`, borderRadius: 6, fontSize: 16, fontWeight: 700, fontFamily: "inherit" }} />
      <span style={{ fontSize: 11, color: C.textMuted }}>Enter {"·"} Esc reset</span>
    </div></div>;
  if(inline)return<span style={{display:"inline-flex",alignItems:"center",gap:6}}>
    <span style={{fontSize:16,fontWeight:700,color:dc,background:isOv?C.overridePale:"transparent",padding:isOv?"1px 6px":0,borderRadius:4}}>{prefix||""}{typeof val==="number"?fmtNum(val):val}{suffix||""}</span>
    <PencilBtn onClick={()=>setEditing(true)} isOverridden={isOv}/>{info&&<InfoTip text={info}/>}</span>;
  return<div style={{minWidth:130,flex:"1 1 130px"}}>
    {label&&<div style={{fontSize:12,fontWeight:600,color:C.textMuted,letterSpacing:".01em",marginBottom:2,display:"flex",alignItems:"center"}}>{label}{info&&<InfoTip text={info}/>}</div>}

  </div>;
}

function AnimatedSlider({ value, min, max, step, onChange, label, suffix, display, hideRange }) {
  const [av, setAv] = useState(value);
  const [drag, setDrag] = useState(false);
  const trackRef = useRef(null), animRef = useRef(null);
  useEffect(() => { if (drag) return; if (animRef.current) cancelAnimationFrame(animRef.current); const from=av,to=value; if(from===to)return; const start=performance.now(); const tick=now=>{const p=Math.min((now-start)/350,1);setAv(Math.round((from+(to-from)*(1-Math.pow(1-p,3)))/step)*step);if(p<1)animRef.current=requestAnimationFrame(tick);}; animRef.current=requestAnimationFrame(tick); }, [value]);
  const pct=((av-min)/(max-min))*100;
  return <div className="roi-slider" style={{flex:"1 1 200px",minWidth:180}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
      <label style={{fontSize:13,fontWeight:600,color:C.textMid}}>{label}</label>
      <span style={{fontSize:20,fontWeight:800,color:C.accent}}>{display!=null?display:av}{suffix||""}</span>
    </div>
    <div ref={trackRef} style={{position:"relative",height:24,cursor:"pointer",display:"flex",alignItems:"center"}}>
      <div style={{position:"absolute",left:0,right:0,height:6,borderRadius:3,background:"#e0e4ea"}}/>
      <div style={{position:"absolute",left:0,width:`${pct}%`,height:6,borderRadius:3,background:C.accent,transition:drag?"none":"width .3s"}}/>
      <div style={{position:"absolute",left:`${pct}%`,width:18,height:18,borderRadius:"50%",background:"#fff",border:`3px solid ${C.accent}`,transform:"translateX(-50%)",boxShadow:"0 1px 4px rgba(0,0,0,.15)",transition:drag?"none":"left .3s",zIndex:1}}/>
      <input type="range" min={min} max={max} step={step} value={av}
        onInput={e=>{setDrag(true);const v=+e.target.value;setAv(v);onChange(v);}}
        onMouseDown={()=>setDrag(true)} onMouseUp={()=>setDrag(false)}
        onTouchStart={()=>setDrag(true)} onTouchEnd={()=>setDrag(false)}
        style={{position:"absolute",width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2,margin:0}}/>
    </div>
    {!hideRange&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted,marginTop:2}}><span>{min}{suffix||""}</span><span>{max}{suffix||""}</span></div>}
  </div>;
}

      {!perOrgSystems ? (
        <div>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

              {tier:"enterprise",label:sector==="aged_care"?"Care management platforms":sector==="ndis"?"Client management systems":"Enterprise systems",color:C.accent,bg:C.accentPale,br:C.border,hint:sector==="aged_care"?"e.g. Leecare, iCare, eCase, AlayaCare":sector==="ndis"?"e.g. ShiftCare, SupportAbility, Lumary":"e.g. legacy EMR, PAS, large clinical suites",max:Math.max(10, inputs.tiers.enterprise + 2),tip:sector==="aged_care"?"Primary resident care platforms. Highest per-system cost.":sector==="ndis"?"Primary participant/client management platforms.":"Large clinical platforms, e.g. legacy EMR/PAS, major departmental suites. High per-system cost."},
              {tier:"departmental",label:sector==="aged_care"?"Medication & rostering":sector==="ndis"?"Rostering & scheduling":"Departmental systems",color:"#1a7a7a",bg:"#eef9f7",br:"#c0e8e2",hint:sector==="aged_care"?"e.g. MPS Connect, WebsterCare, Humanforce, Deputy":sector==="ndis"?"e.g. RotaWiz, Deputy, Humanforce":"e.g. theatres, lab, ED, maternity, radiology",max:Math.max(30, inputs.tiers.departmental + 5),tip:sector==="aged_care"?"Medication management, rostering, and scheduling systems.":sector==="ndis"?"Staff rostering, scheduling, and travel planning systems.":"Mid-tier clinical systems serving one department or specialty. Moderate running costs."},
              {tier:"niche",label:sector==="aged_care"?"Compliance & admin":sector==="ndis"?"Billing & compliance":"Standalone systems",color:"#3d8a8a",bg:C.tealPale,br:`${C.teal}22`,hint:sector==="aged_care"?"e.g. QI reporting, SIRS, audit tools, finance":sector==="ndis"?"e.g. NDIA claims, incident reporting, worker screening":"e.g. document stores, scanned notes, specialty databases",max:Math.max(100, inputs.tiers.niche + 10),tip:sector==="aged_care"?"Compliance, quality indicator reporting, finance, and admin tools.":sector==="ndis"?"NDIA billing/claims, incident reporting, worker screening, finance.":"Small self-contained tools, e.g. single-function databases, document stores, scanned notes. Low individual cost but they add up."},
            ].map(t=>{
              const computedCost = tierCost(t.tier,inputs.bed_count,CX[inputs.complexity_level]);
              const editKey = t.tier;
              const knownKey = t.tier === "enterprise" ? "entCost" : t.tier === "departmental" ? "depCost" : "nicCost";
              const knownDerived = costMode === "known" && knownAnnualSpend > 0 ? knownCostOv[knownKey] : null;
              const displayCost = tierCostEdits[editKey] != null ? tierCostEdits[editKey] : (knownDerived || computedCost);
              const isEdited = tierCostEdits[editKey] != null;
              const isEditing = editingTierCost === editKey;
              return <div key={t.tier} className="roi-tier" style={{padding:"16px 18px",background:t.bg,borderRadius:10,border:`1px solid ${t.br}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                                <span style={{fontSize:14,fontWeight:700,color:C.text}}>{t.label}</span>
                <InfoTip text={t.tip}/>
                {isEditing ? (
                  <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:13,color:C.textMuted}}>{"A$"}</span>
                    <input type="number" autoFocus defaultValue={displayCost} min={0} max={1000000} step={1000}
                      onBlur={e => { const v = parseInt(e.target.value); if (!isNaN(v) && v >= 0) { setTierCostEdits(p=>({...p,[editKey]:v})); } setEditingTierCost(null); }}
                      onKeyDown={e => { if(e.key==="Enter") e.target.blur(); if(e.key==="Escape"){ setEditingTierCost(null); } }}
                      style={{width:80,padding:"4px 6px",fontSize:14,fontWeight:700,border:`1px solid ${C.accent}`,borderRadius:4,fontFamily:"inherit",textAlign:"right"}}/>

                    {isEdited && <span onClick={e=>{e.stopPropagation();setTierCostEdits(p=>({...p,[editKey]:null}));}} title="Reset to calculated" style={{fontSize:12,color:C.accent,cursor:"pointer",marginLeft:2,padding:"6px 8px"}}>{"✕"}</span>}
                    {costMode === "known" && knownAnnualSpend > 0 && !isEdited && <span style={{fontSize:10,color:C.textMid,marginLeft:4,fontWeight:500}}>from total</span>}

              {(() => {
                const _ttm = sector === "aged_care" ? TIER_TYPE_MAP_AC : sector === "ndis" ? TIER_TYPE_MAP_NDIS : TIER_TYPE_MAP_HOSPITAL;
                const tierTypes = _ttm[t.tier] || [];
                const tierSys = knownSystems.filter(s => tierTypes.includes(s.type));
                const selNames = flagships.map(f => f.known || f.name);

                return <details style={{marginTop:8}}>
                  <summary style={{fontSize:12,fontWeight:600,color:C.accent,cursor:"pointer",padding:"4px 0"}}>

                    {(() => { const n = tierSys.filter(s => selNames.includes(s.label)).length; return n > 0 ? " ("+n+" selected)" : ""; })()}

                        if (sel) { setFlagships(p => p.filter(f => (f.known||f.name) !== sys.label)); }
                        else { addFlagship(sys, t.tier); }
                        touch(2);
                      }} style={{padding:"6px 10px",fontSize:11,fontWeight:sel?700:500,border:"1px solid "+(sel?C.accent:C.borderLight),borderRadius:8,background:sel?C.accentPale:"#fff",color:sel?C.accent:C.textMid,cursor:"pointer",fontFamily:"inherit"}}>
                        {sel ? "\u2713 " : ""}{sys.label}
                        <span style={{fontSize:10,color:C.textMuted,marginLeft:4}}>~{fmtK(systemCost(sys, inputs.bed_count))}</span>
                      </button>;
                    })}
                  </div>
                </details>;
              })()}

            </div>})}

          {/* Non-acute facility systems */}
          {portfolioImpact.addSystems > 0 && <div style={{padding:"12px 16px",background:C.greenPale,borderRadius:10,border:`1px solid ${C.green}25`}}>

                    style={{width:48,fontSize:15,fontWeight:800,color:C.green,border:`1px solid ${C.borderLight}`,borderRadius:6,padding:"3px 5px",background:"#fff",fontFamily:"inherit",textAlign:"right"}}/>
                  <span style={{fontSize:11,color:C.textMuted}}>systems</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:11,color:C.textMuted}}>A$</span>

                    onChange={e=>setPortfolioOv(p=>({...p,cost:Math.max(0,parseInt(e.target.value)||0)}))}

                  <span style={{fontSize:11,color:C.textMuted}}>/yr</span>
                </div>
                {(portfolioOv.systems != null || portfolioOv.cost != null) &&

              </div>
            </div>
          </div>}
          </div>

        </div>
      ) : (
        <div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {orgTiersList.map((org, oi) => (

                <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>Org {oi+1}{orgBedsList[oi] != null ? ` (${fmtNum(orgBedsList[oi])} ${unitLabel})` : ""}</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {[
                    {tier:"enterprise",label:"Enterprise",color:C.accent,max:Math.max(5, org.enterprise + 2)},
                    {tier:"departmental",label:"Departmental",color:"#1a7a7a",max:Math.max(15, org.departmental + 3)},
                    {tier:"niche",label:"Standalone",color:"#3d8a8a",max:Math.max(50, org.niche + 5)},

                      <div style={{display:"flex",alignItems:"center",gap:6}}>

                          style={{flex:1,cursor:"pointer",accentColor:t.color}} />
                        <span style={{fontSize:15,fontWeight:800,color:t.color,minWidth:24,textAlign:"right"}}>{org[t.tier]}</span>

                <div style={{marginTop:6,fontSize:12,color:C.textMid}}>Subtotal: {org.enterprise + org.departmental + org.niche} systems</div>

          </div>
          <div style={{marginTop:12,padding:"10px 14px",background:C.accentPale,borderRadius:8,display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:600,color:C.textMid}}>Totals:</span>
            <span style={{fontSize:13,color:C.textMid}}>{inputs.tiers.enterprise} enterprise, {inputs.tiers.departmental} departmental, {inputs.tiers.niche} standalone{(portfolioOv.systems != null ? portfolioOv.systems : portfolioImpact.addSystems) > 0 ? `, +${(portfolioOv.systems != null ? portfolioOv.systems : portfolioImpact.addSystems)} non-acute` : ""}</span>
            <span style={{fontSize:20,fontWeight:800,color:C.accent,marginLeft:"auto"}}>{totalSystems + flagships.length + (portfolioOv.systems != null ? portfolioOv.systems : portfolioImpact.addSystems)}</span>
          </div>
        </div>

      <button type="button" onClick={()=>{

          <div key={"f"+i} style={{padding:"10px 14px",background:C.bg,borderRadius:8,border:"1px solid "+C.borderLight,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:C.textMid,cursor:"pointer"}}>

            <button type="button" onClick={() => removeFlagship(i)} style={{border:"none",background:"none",color:C.textMuted,fontSize:16,cursor:"pointer",padding:"4px 8px"}} title="Remove">{"\u2715"}</button>
          </div>

      </div>}

      {(totalSystems + flagships.length) > 0 && (() => {

          inputs.tiers.enterprise * (tierCostEdits.enterprise != null ? tierCostEdits.enterprise : tierCost("enterprise",inputs.bed_count,CX[inputs.complexity_level]))
          + inputs.tiers.departmental * (tierCostEdits.departmental != null ? tierCostEdits.departmental : tierCost("departmental",inputs.bed_count,CX[inputs.complexity_level]))
          + inputs.tiers.niche * (tierCostEdits.niche != null ? tierCostEdits.niche : tierCost("niche",inputs.bed_count,CX[inputs.complexity_level]))
          + flagships.reduce((s,f) => s + (f.cost||0), 0);
        const hasCustomCost = costMode === "known" || tierCostEdits.enterprise != null || tierCostEdits.departmental != null || tierCostEdits.niche != null || flagships.length > 0;
        return <>
          <div style={{marginTop:16,padding:"14px 18px",background:C.bg,borderRadius:8,border:`1px solid ${C.borderLight}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:34,fontWeight:800,color:C.accent,lineHeight:1}}>{totalSystems + flagships.length + (portfolioOv.systems != null ? portfolioOv.systems : portfolioImpact.addSystems)}</div>

            </div>
          </div>
          {!hasCustomCost && costMode === "estimate" && <div style={{marginTop:8,padding:"12px 16px",background:"#f0faf8",borderRadius:8,border:"1px solid #b0e0d8",fontSize:13,color:"#0F4146",lineHeight:1.6}}>
            <strong>Know your actual costs?</strong> Click any tier cost above to override, switch to {'"'}I know my spend{'"'}, or add named systems below. Real contract values give the most accurate ROI.
          </div>}
        </>;
      })()}
    </Card></div>

    {step<2?<ContinuePrompt onClick={()=>goTo(2,ref3)} label="Next: fine-tune"/>:<LockedConnector/>}




    {/* STEP 4 - Fine-tune */}
    <div ref={ref3} style={{animation:step>=2?"fade-in .4s ease":"none"}}><Card dimmed={step<2}>
      <div style={{fontSize:12,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{width:24,height:24,borderRadius:"50%",background:step>=2?C.accent:C.border,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>5</span>
        Fine-tune
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
        <div style={{flex:"1 1 200px"}}><label style={{fontSize:13,fontWeight:600,color:C.textMid,marginBottom:5,display:"flex",alignItems:"center"}}>Complexity<InfoTip text="How bespoke are your legacy systems? High = more expensive (bigger decom savings) but harder interfaces (more wasted time)."/></label>
          <select value={inputs.complexity_level} onChange={e=>{update("complexity_level",e.target.value);touch(3);}} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:"inherit"}}><option value="LOW">Low</option><option value="TYPICAL">Typical</option><option value="HIGH">High</option></select></div>
        <div style={{flex:"1 1 200px"}}><label style={{fontSize:13,fontWeight:600,color:C.textMid,marginBottom:5,display:"flex",alignItems:"center"}}>Data quality<InfoTip text="How clean is your legacy data? Poor quality increases clinician time wasted, support tickets, and patient records request turnaround."/></label>
          <select value={inputs.data_quality_level} onChange={e=>{update("data_quality_level",e.target.value);touch(3);}} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,fontFamily:"inherit"}}><option value="CLEAN">Clean</option><option value="MIXED">Mixed</option><option value="POOR">Poor</option></select></div>
      </div>

      <AnimatedSlider label={<span>Decommission target<InfoTip text="What % of legacy systems do you plan to retire? 60-80% is typical as most programmes retain a few for standalone or long-retention use."/></span>} value={inputs.decom_retire_rate} min={0} max={1} step={0.05} display={`${Math.round(inputs.decom_retire_rate*100)}%`} onChange={v=>{update("decom_retire_rate",v);touch(3);}} suffix=""/>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:C.textMid,marginBottom:8}}>Projection period</div>
        <div style={{display:"flex",gap:10}}>
          {[
            {yr:3, label:"3-year", ramp:"40% / 80% / 100%", desc:"Single hospital or LHD programmes"},
            {yr:5, label:"5-year", ramp:"20% / 40% / 60% / 80% / 100%", desc:"Recommended for statewide programmes"},
          ].map(opt => <button type="button" key={opt.yr} onClick={()=>setRampYears(opt.yr)} style={{flex:1,padding:"16px 18px",textAlign:"left",cursor:"pointer",borderRadius:12,border:rampYears===opt.yr?`2px solid ${C.accent}`:`1px solid ${C.borderLight}`,background:rampYears===opt.yr?C.accentPale:"#fff",transition:"all .15s"}}>
            <div style={{fontSize:20,fontWeight:800,color:rampYears===opt.yr?C.accent:C.textMid,marginBottom:4}}>{opt.label}</div>
            <div style={{fontSize:12,fontWeight:600,color:rampYears===opt.yr?C.accent:C.textMuted,marginBottom:4}}>Phased ramp: {opt.ramp}</div>
            <div style={{fontSize:11,color:C.textMuted}}>{opt.desc}</div>
          </button>)}
        </div>
      </div>

      <AnimatedSlider label={<span>{sector === "aged_care" ? "Occupancy rate" : sector === "ndis" ? "Utilisation rate" : "Bed occupancy rate"}<InfoTip text={sector === "aged_care" ? "Average occupancy across your residential places. Typical 90-95%. Drives revenue and staffing estimates." : sector === "ndis" ? "Proportion of available staff hours that are billable. Typical 65-75%. Drives revenue and utilisation uplift estimates." : "Average bed occupancy. National average is ~90% (OECD 2023, AMA). This drives admission volume, revenue estimates, and ADE calculations."}/></span>} value={occupancyRate} min={0.30} max={1.00} step={0.01} display={`${Math.round(occupancyRate*100)}%`} onChange={v=>{setOccupancyRate(v);touch(3);}} suffix=""/>

      <div style={{marginTop:16,padding:"14px 16px",background:C.bg,borderRadius:8,border:`1px solid ${C.borderLight}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:600,color:C.textMid}}>ABF revenue (optional)</span>

            <tbody>

              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Time realisation rate</td><td style={{padding:"6px 10px",textAlign:"center"}}>20%</td><td style={{padding:"6px 10px",textAlign:"center"}}>30%</td><td style={{padding:"6px 10px",textAlign:"center"}}>40%</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Safety reduction</td><td style={{padding:"6px 10px",textAlign:"center"}}>15%</td><td style={{padding:"6px 10px",textAlign:"center"}}>25%</td><td style={{padding:"6px 10px",textAlign:"center"}}>35%</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Decom scaling</strong> adjusts how many of your planned retirements actually happen {" - "} Conservative assumes 85% (programme delays, contractual holdups), Stretch assumes 10% overachievement. <Md s="No published benchmark. User sets their own target and this scales it."/></p>
          <p style={{margin:"4px 0"}}><strong>Time realisation</strong> {" - "} the fraction of freed clinician time that translates into measurable capacity. IHI productive ward reported 20-40%. <Bm s="IHI productive ward programme; IHI operational efficiency framework."/></p>
          <p style={{margin:"4px 0"}}><strong>Safety reduction</strong> {" - "} avoidable medication errors from system consolidation. QAO 2018 (Princess Alexandra Hospital): 8% reduction in medication errors, 37% decrease in infections post-ieMR. Woods et al 2024 (DigiMat): 12.87% decline in medication complications. <Ev s="QAO 2018-19 (QLD ieMR); Woods et al 2024 DigiMat; ACSQHC safety reports."/></p>
        </S>

        <S title="2. System cost estimation">
          <p style={{margin:"0 0 8px"}}>Each legacy system is classified into one of three tiers. Annual cost scales with bed count and complexity.</p>
          <F>tierCost = round((base + beds {"\u00d7"} perBed) {"\u00d7"} complexity / 1000) {"\u00d7"} 1000</F>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Tier</th><th style={{padding:"6px 10px"}}>Base</th><th style={{padding:"6px 10px"}}>Per bed</th><th style={{padding:"6px 10px"}}>800 beds (Typical)</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Enterprise</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}300k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}700/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"A$"}860k/yr</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Departmental</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}75k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}160/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"A$"}203k/yr</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Standalone</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}14k</td><td style={{padding:"6px 10px",textAlign:"center"}}>{"A$"}20/bed</td><td style={{padding:"6px 10px",textAlign:"center",fontWeight:700}}>{"A$"}30k/yr</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>These formulas were calibrated against real contract data from a large acute health system (~1,385 beds, 42 legacy systems). Default estimates cover ~80% of actual estate value. <Bn s="Validated against contract register from a large acute health system (~1,385 beds, 42 systems, 2024/25 data)."/></p>
          <p style={{margin:"4px 0"}}>The complexity multiplier adjusts costs: Low 0.70, Typical 1.00, High 1.45. <Md s="Calibrated to produce approximately +/-30% variation. Benchmarked Trust classified as HIGH (1.45)."/></p>
          <p style={{margin:"4px 0"}}>For trusts with known contract values, click any tier cost to override it, add named flagship systems with actual costs, or use {"\u201c"}I know my spend{"\u201d"} mode to enter your total directly.</p>
        </S>

        <S title="3. Decommission savings">
          <p style={{margin:"0 0 8px"}}>The primary financial benefit: retiring legacy systems eliminates their annual running costs.</p>
          <F>1. Set decom target (default 75%)<br/>2. rawDecom = totalSystems {"\u00d7"} decomTarget {"\u00d7"} scenarioMultiplier<br/>3. Systems retired pro-rata across tiers<br/>4. decomSave = (entRetired {"\u00d7"} entCost) + (depRetired {"\u00d7"} depCost) + (nicRetired {"\u00d7"} nicCost) + flagshipSave</F>
          <p style={{margin:"8px 0 4px"}}><strong>75% default decom target</strong> {" - "} most EMR migration programmes plan to retire 60-80% of legacy systems. Some are retained for long-retention data or functions not covered by the new EMR. Validated against real health system data where ~32 of 42 systems were candidates for retirement. <Bm s="EMR programme consensus; validated against benchmarked health system application footprint."/></p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems</strong> flagged as {"\u201c"}Retire{"\u201d"} are decommissioned at their full stated contract value, scaled by the scenario multiplier.</p>
        </S>

        <S title="4. Clinician time savings">
          <p style={{margin:"0 0 8px"}}>Time freed when clinicians no longer switch between multiple legacy systems.</p>
          <F>corpPerOrg = min(120, 20 + bedsPerFacility {"\u00d7"} 0.15)<br/>clinicians = beds {"\u00d7"} 3.0 + facilities {"\u00d7"} corpPerOrg<br/>switchPenalty = min(max(0, systems - 1) {"\u00d7"} 0.04, 4.0)<br/>minsWasted = baseMin {"\u00d7"} DQ {"\u00d7"} CX {"\u00d7"} (1 + switchPenalty)<br/>hrsSaved = clinicians {"\u00d7"} (minsWasted - residual) {"\u00d7"} 48wks / 60<br/>timeSave = hrsSaved {"\u00d7"} {"A$"}65/hr {"\u00d7"} realisationRate</F>
          <p style={{margin:"8px 0 4px"}}><strong>3.0 staff per bed</strong> {" - "} NSW Health SDPR EOI: 75,500 clinical staff / 25,632 beds = 2.95, rounded to 3.0. Includes doctors, nurses, allied health, pharmacists. <Ev s="NSW Health SDPR EOI (HT20037) Annexure A; AIHW workforce data."/></p>
          <p style={{margin:"4px 0"}}><strong>12 min/wk base</strong> (migration path) {" - "} Westbrook et al 2010 (JAMIA) found nurses interrupted 3-6 times/hour by system-switching. Nuffield Trust 2020 estimated 15-20 min/day lost to system navigation. Our 12 min/week is conservative (reducible portion only). Archive-only uses 5 min/wk. <Ev s="Westbrook et al 2010 (JAMIA); Nuffield Trust 2020 system navigation study."/></p>
          <p style={{margin:"4px 0"}}><strong>+4% per system</strong> {" - "} each additional legacy system adds cognitive overhead. At 42 systems (as in the benchmarked Trust), this produces ~10 min/day wasted, consistent with published studies. <Md s="First-principles switching cost model. Validated against benchmarked Trust (42 systems)."/></p>
          <p style={{margin:"4px 0"}}><strong>{"A$"}65/hr blended rate</strong> {" - "} AIHW (Australian Institute of Health and Welfare) workforce cost data. RN ~A$45-55/hr, medical ~A$90-120/hr, allied health ~A$40-60/hr. Blended A$65/hr weighted towards nursing as the largest clinical user group (~62% of clinical FTE). <Ev s="AIHW Health Workforce data; ABS Employee Earnings and Hours; NSW Health Annual Report."/></p>
        </S>

        <S title="5. Support tickets & patient records request (SAR) turnaround">
          <p style={{margin:"0 0 8px"}}><strong>Tickets:</strong> 2.5 per system/month baseline (IT Infrastructure Library / ITIL service desk metrics). Surviving systems generate 40% fewer tickets due to consolidated support. <Bm s="ITIL service desk benchmarks; 0.6 surviving-system factor is a modelled estimate."/></p>
          <p style={{margin:"4px 0"}}><strong>Patient records request turnaround:</strong> 3-day base (cross-LHD coordination, redaction, QA) + 0.8 days per core system (before), 0.15 days per surviving system (after). NSW public health organisations must respond to records requests within a reasonable timeframe (no explicit statutory maximum for public sector; HRIP Act 2002 applies to private health). Turnaround scales with core clinical systems searched (capped at 20) {" - "} consistent with reports from health systems with fragmented EMR estates. <Md s="Capped at 20 core clinical systems. Based on Australian HIM department workflow data."/></p>
        </S>

        <S title="6. Patient safety metrics">
          <p style={{margin:"0 0 8px"}}>These are <strong>clinical quality metrics</strong> that support the financial estimates above. The excess bed days and indemnity costs are quantified in the Avoidable Cost of Harm section.</p>
          <F>medErrors = beds {"\u00d7"} 14 {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>patientsHarmed = beds {"\u00d7"} 5.8 {"\u00d7"} 35% attribution {"\u00d7"} fragmentation {"\u00d7"} DQ<br/>excessBedDays = beds {"\u00d7"} 8.0 {"\u00d7"} 35% attribution {"\u00d7"} fragmentation {"\u00d7"} DQ</F>
          <p style={{margin:"8px 0 4px"}}><strong>14 medication errors per bed/yr</strong> {" - "} Westbrook et al (2015, two Sydney teaching hospitals) found incident reports capture only 1.2 per 1,000 actual errors. Administration errors occur in ~9% of medication administrations (ACSQHC 2013). At least 250,000 medication-related admissions annually costing A$1.4 billion (ACSQHC 2020). <Ev s="Westbrook et al 2015; ACSQHC 2013/2020; Runciman et al 2003."/></p>
          <p style={{margin:"4px 0"}}><strong>3.2 patients harmed per bed/yr</strong> {" - "} AIHW administrative data shows 5.4% of separations; at ~60 overnight separations per bed per year (ALOS 5.5), this yields ~3.2 adverse events per bed. The foundational QAHCS study (Wilson et al. 1995) found 16.6% of admissions associated with adverse events. Approximately 50% are deemed preventable. <Ev s="ACSQHC National Safety and Quality Reports; AIHW Hospital Statistics."/></p>
          <p style={{margin:"4px 0"}}><strong>8.0 excess bed days per bed/yr</strong> {" - "} QAHCS data: adverse events account for ~8% of total hospital bed days. Ehsani et al. (2006, MJA): patients with AEs stay ~10 additional days on average, totalling 15.7% of direct hospital costs. At A$3,100/day average per diem (IHACPA). <Ev s="ACSQHC sentinel event data; AIHW hospital statistics; IHACPA 2023; Choosing Wisely Australia."/></p>
          <p style={{margin:"4px 0"}}><strong>Fragmentation index</strong> (0.6-1.2) scales risk by number of systems. Vest et al (JAMIA 2015) found 57% higher odds of same-cause readmission with fragmented records. Caps at 20 systems (diminishing marginal fragmentation). <Md s="No published fragmentation index exists. Informed by Vest et al JAMIA 2015 readmission odds."/></p>
          <p style={{margin:"4px 0"}}><strong>Medical indemnity context:</strong> ACSQHC reports that communication failure contributes to approximately 35% of clinical incidents in Australian hospitals. State-based indemnity schemes (icare NSW, VMIA VIC, Coverforce QLD) reflect this in claims data. EMR consolidation reduces fragmentation-related communication failures. <Ev s="ACSQHC National Safety Reports; icare NSW annual reports; VMIA clinical risk data."/></p>
        </S>

        <S title="7. Evidence base and validation">
          <p style={{margin:"0 0 8px"}}>Key evidence sources underpinning the Australian model:</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Metric</th><th style={{padding:"6px 10px"}}>Value</th><th style={{padding:"6px 10px"}}>Source</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Medication complications (post-EMR)</td><td style={{padding:"6px 10px",textAlign:"center"}}>12.87% decline</td><td style={{padding:"6px 10px"}}>Woods et al 2024 DigiMat (1.55M QLD episodes)</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>In-hospital mortality (post-EMR)</td><td style={{padding:"6px 10px",textAlign:"center"}}>22% decrease</td><td style={{padding:"6px 10px"}}>South et al 2022 (RCH Melbourne)</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Patients harmed</td><td style={{padding:"6px 10px",textAlign:"center"}}>5.4-6.6% of separations</td><td style={{padding:"6px 10px"}}>AIHW 2023-24 / QAHCS</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Comm. failure in incidents</td><td style={{padding:"6px 10px",textAlign:"center"}}>35%</td><td style={{padding:"6px 10px"}}>ACSQHC root cause analyses</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Excess bed day cost</td><td style={{padding:"6px 10px",textAlign:"center"}}>A$3,100/day</td><td style={{padding:"6px 10px"}}>IHACPA long-stay outlier per diems</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>Duplicate testing rate</td><td style={{padding:"6px 10px",textAlign:"center"}}>22%</td><td style={{padding:"6px 10px"}}>Banker et al 2024 (SA); RCPA guidelines</td></tr>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px"}}>NEP (National Efficient Price) per NWAU</td><td style={{padding:"6px 10px",textAlign:"center"}}>A$7,258</td><td style={{padding:"6px 10px"}}>IHACPA 2025-26</td></tr>
              <tr><td style={{padding:"6px 10px"}}>Medical indemnity/bed</td><td style={{padding:"6px 10px",textAlign:"center"}}>A$20,000</td><td style={{padding:"6px 10px"}}>VMIA 2025-26 ($380.9M / ~16k beds)</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}>Queensland DigiMat study (Woods et al 2024): analysis of 1.55 million episodes across 13 Queensland hospitals found 12.87% decline in medication complications, 14.27% reduction in hospital-acquired infections, and 3.42% increase in hospital activity post-ieMR. <Ev s="Woods et al 2024, Int J Medical Informatics; Queensland Audit Office 2018-19."/></p>
          <p style={{margin:"4px 0"}}>Royal Children's Hospital Melbourne (South et al 2022): analysis of 355,709 discharges showed sustained ~22% decrease in in-hospital mortality after Epic implementation. Productivity Commission May 2024: better use of EMR data could save up to A$5.4 billion/yr nationally. <Ev s="South et al 2022, J Paediatrics and Child Health; Productivity Commission May 2024."/></p>

        </S>

        <S title="8. ABF efficiency and compliance methodology">
          <p style={{margin:"0 0 8px"}}>ABF efficiency gain and revenue cycle impact are modelled from verified programme rates and provider-specific multipliers.</p>
          <F>abfEfficiencyGain = totalEstate {"\u00d7"} 15% {"\u00d7"} decomFactor<br/>privateRevRecovery = admissions {"\u00d7"} privatePct {"\u00d7"} 15% leakage {"\u00d7"} A$4,200 {"\u00d7"} 30% recoverable<br/>indemnityReduction = beds {"\u00d7"} A$20,000 {"\u00d7"} 3% {"\u00d7"} safetyFactor<br/>excessBedDaySavings = beds {"\u00d7"} 8.0 days {"\u00d7"} 35% attribution {"\u00d7"} fragmentation {"\u00d7"} safetyFactor {"\u00d7"} A$3,100</F>
          <p style={{margin:"8px 0 4px"}}><strong>ABF efficiency</strong> {" - "} Activity Based Funding through IHPA. National Efficient Price A$7,258/NWAU (IHACPA 2025-26 Determination; 2025-26 = A$7,258). IT/admin overhead estimated at 8% of total hospital costs, with 25% addressable through system consolidation. <Ev s="IHACPA National Efficient Price Determination 2024-25; AIHW hospital expenditure data."/></p>
          <p style={{margin:"4px 0"}}><strong>Private patient revenue</strong> {" - "} 15% of privately insured episodes in public hospitals estimated to go unbilled due to incomplete documentation. Average private episode value A$4,200 above ABF rate. <Ev s="VAGO 2019; APRA (Australian Prudential Regulation Authority) Private Health Insurance (PHI) statistics; PHIO annual reports."/></p>
          <p style={{margin:"4px 0"}}><strong>Medical indemnity</strong> {" - "} A$20,000/bed institutional indemnity (VMIA 2025-26: $380.9M for ~16,000 VIC beds). 3% reduction modelled from ACSQHC communication failure data. <Ev s="VMIA 2025-26 annual report; ACSQHC root cause analyses."/></p>

          
          <p style={{margin:"4px 0"}}><strong>Provider type multipliers</strong> affect ABF funding proportion, private patient rate, and system complexity weighting. Rural hospitals have lower private patient rates; tertiary centres have higher system complexity due to research and teaching platforms. <Md s="Provider multipliers modelled from Australian hospital classification data. Statewide preset calibrated against NSW Health SDPR EOI (HT20037): 25,632 beds, 75,500+ clinical staff, 450+ facilities, 60+ labs, 200+ collection points, 110,000+ EMR users."/></p>
        </S>

        <S title="9. Complexity and data quality adjustments">
          <p style={{margin:"0 0 8px"}}>Two multipliers adjust the model for your specific environment.</p>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,margin:"8px 0"}}>
            <thead><tr style={{background:C.accent,color:"#fff"}}><th style={{padding:"6px 10px",textAlign:"left"}}>Setting</th><th style={{padding:"6px 10px"}}>Low / Clean</th><th style={{padding:"6px 10px"}}>Typical / Mixed</th><th style={{padding:"6px 10px"}}>High / Poor</th><th style={{padding:"6px 10px"}}>What it affects</th></tr></thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"6px 10px",fontWeight:600}}>Complexity</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.70</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.45</td><td style={{padding:"6px 10px"}}>System costs, minutes wasted</td></tr>
              <tr><td style={{padding:"6px 10px",fontWeight:600}}>Data quality</td><td style={{padding:"6px 10px",textAlign:"center"}}>0.75</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.00</td><td style={{padding:"6px 10px",textAlign:"center"}}>1.40</td><td style={{padding:"6px 10px"}}>Minutes wasted, tickets, SAR time</td></tr>
            </tbody>
          </table></div>
          <p style={{margin:"8px 0 4px"}}><strong>Complexity</strong> reflects how bespoke and integrated your legacy systems are. Low means off-the-shelf with simple interfaces. High means heavily customised systems with deep integrations and complex data models. Higher complexity increases both per-system costs (more expensive to run) and clinician time wasted (harder to navigate). <Md s="Designed to produce approximately +/-30% variation around baseline, consistent with observed range across health system application estates."/></p>
          <p style={{margin:"4px 0"}}><strong>Data quality</strong> affects how long clinicians spend searching for information. Clean data means well-structured records with consistent coding. Poor data means duplicate records, missing fields, and inconsistent formats. Poor quality roughly doubles the effort of finding information compared to clean data. <Md s="Modelled estimate. Poor data approximately doubles effort vs clean data."/></p>
        </S>

        <S title="10. How the three input modes work">
          <p style={{margin:"0 0 8px"}}>You can provide cost data at three levels of detail, depending on what you know about your legacy estate.</p>
          <p style={{margin:"4px 0"}}><strong>Estimate (default):</strong> The calculator uses the bed-scaled tier cost formulas to estimate your annual legacy spend. Best when you do not have contract data available. In benchmarking, this covered approximately 80% of a real Trust's actual estate value.</p>
          <p style={{margin:"4px 0"}}><strong>Named flagship systems:</strong> Add your highest-cost systems individually with their actual contract values (for example, a legacy ADT/registration system at {"A$"}3m/yr). The remaining systems are still costed through the tier formulas. This captures outlier contracts that generic formulas underestimate.</p>
          <p style={{margin:"4px 0"}}><strong>"I know my spend" mode:</strong> Enter your total annual legacy system spend. The calculator distributes it across tiers using a 5:2:1 weighting ratio (enterprise : departmental : standalone). You can then click any derived tier cost to fine-tune. In benchmarking, this mode produced results within 2.5% of the stated estimate.</p>
          <p style={{margin:"4px 0"}}>In all modes, you can click any individual tier cost to override it with your actual figure.</p>
        </S>

        <S title="11. What is included and excluded">
          <p style={{margin:"0 0 8px"}}><strong>Included:</strong> Decommission savings (licensing, hosting, support costs eliminated), clinician time capacity value (hours freed, valued at blended rate with realisation discount), ABF efficiency gain, private patient revenue uplift, medical indemnity reduction, excess bed day cost avoidance, and duplicate testing reduction.</p>
          <p style={{margin:"4px 0"}}><strong>Excluded:</strong> EMR implementation costs (covered separately), parallel-run costs (too variable to model), data migration costs (one-off programme budget), implementation disruption period (12-24 months of potential performance degradation per QLD ieMR and SA EPAS experience), and staffing increases during transition.</p>
          <p style={{margin:"4px 0"}}>The 3-year total assumes flat annual savings. In practice, savings may increase in years 2-3 as more systems are retired, or decrease as easy wins are captured first.</p>
        </S>

        <div style={{marginTop:12,padding:"10px 14px",background:C.bg,borderRadius:8,fontSize:11,color:C.textMuted,lineHeight:1.6}}>
          All formulas sourced from peer-reviewed Australian and international literature, AIHW/IHACPA data, state audit reports, and Productivity Commission research. Tier costs calibrated against QLD and NSW state contract data. All figures are user-overridable.
        </div>
      </Card>;
    })()}

    </>}

      const FormulaSection = ({color, title, total, formula, plug, source}) => (
        <div style={{marginBottom:16,padding:"14px 16px",background:"#fff",borderRadius:10,border:`1px solid ${C.borderLight}`,borderLeft:`4px solid ${color}`}}>
