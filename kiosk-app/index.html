<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0, user-scalable=no" />
  <title>EHR Migration & Archiving — ROI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { width: 1080px; min-height: 1920px; }
    body { margin: 0; padding: 0; width: 1080px; min-height: 1920px; -webkit-font-smoothing: antialiased; background: #0a0f1a; font-family: 'DM Sans', sans-serif; }
    #root { width: 1080px; min-height: 1920px; }
    input[type=range] { -webkit-appearance: none; height: 16px; border-radius: 8px; background: #1e2840; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 44px; height: 44px; border-radius: 50%; background: #00d4aa; cursor: pointer; border: 3px solid #0a0f1a; box-shadow: 0 2px 12px rgba(0,212,170,0.5); }
    input[type=range]::-moz-range-thumb { width: 44px; height: 44px; border-radius: 50%; background: #00d4aa; cursor: pointer; border: 3px solid #0a0f1a; }
    select { background: #141b2d; color: #e8edf5; border-color: #2a3548; }
    input[type=number] { background: #141b2d; color: #00d4aa; border-color: #2a3548; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0f1a; }
    ::-webkit-scrollbar-thumb { background: #2a3548; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
